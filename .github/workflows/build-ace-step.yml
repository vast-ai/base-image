# Build ACE-Step image - works on main repo (scheduled + manual) and forks (manual)
# Required repository secrets:
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
#   DOCKERHUB_NAMESPACE          - production namespace (final multi-arch index lives here)
#   DOCKERHUB_NAMESPACE_STAGING  - staging namespace (per-arch build artifacts live here)
# Optional: SLACK_WEBHOOK_URL
# Note: Build matrix will need periodic updates as new Pytorch images become available
#
# Multi-arch strategy: each (base_image, arch) pair builds natively on the
# matching runner (ubuntu-latest for amd64, ubuntu-24.04-arm for arm64) and
# pushes an arch-suffixed tag to the STAGING namespace. A per-base_image
# merge job then uses crane to assemble the multi-arch index at the
# PRODUCTION tag. No QEMU emulation.

name: Build ACE-Step Image

on:
  schedule:
    # Run once per week (Monday at midnight UTC)
    - cron: '0 0 * * 1'

  workflow_dispatch:
    inputs:
      ACE_STEP_REF:
        description: "ACE-Step git ref - leave empty for latest"
        required: false
      ACE_STEP_UI_REF:
        description: "ACE-Step UI git ref (default: main)"
        required: false
      DOCKERHUB_REPO:
        description: "Push to username/<repo>"
        required: true
        default: "acestep"
      CUSTOM_IMAGE_TAG:
        description: "Custom tag (Auto default)"
        required: false

env:
  DEFAULT_ACE_STEP_REF: "main"
  DEFAULT_ACE_STEP_UI_REF: "main"
  DEFAULT_DOCKERHUB_REPO: "acestep"
  # 1 week
  RELEASE_AGE_THRESHOLD: 604800
  ACE_STEP_GITHUB_REPO: "ace-step/ACE-Step-1.5"

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.decision.outputs.should-run }}
      ace-step-ref: ${{ steps.resolve-ref.outputs.ref }}
      ace-step-ui-ref: ${{ steps.resolve-ui-ref.outputs.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for required secrets
        id: secrets
        run: |
          missing=()
          [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]] && missing+=("DOCKERHUB_USERNAME")
          [[ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]] && missing+=("DOCKERHUB_TOKEN")
          [[ -z "${{ secrets.DOCKERHUB_NAMESPACE }}" ]] && missing+=("DOCKERHUB_NAMESPACE")
          [[ -z "${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}" ]] && missing+=("DOCKERHUB_NAMESPACE_STAGING")
          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "Required secrets configured"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping - missing secrets: ${missing[*]}"
          fi

      - name: Check for new commits
        id: commit-check
        if: ${{ !inputs.ACE_STEP_REF }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking GitHub for new commits on ${{ env.ACE_STEP_GITHUB_REPO }} main..."

          COMMIT_DATA=$(gh api "repos/${{ env.ACE_STEP_GITHUB_REPO }}/commits/main" \
            --jq '{sha: .sha[0:7], date: .commit.committer.date}')

          COMMIT_SHA=$(echo "$COMMIT_DATA" | jq -r '.sha')
          COMMIT_DATE=$(echo "$COMMIT_DATA" | jq -r '.date')

          if [[ -z "$COMMIT_SHA" || "$COMMIT_SHA" == "null" ]]; then
            echo "::warning::Could not resolve HEAD of main"
            echo "new-release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMIT_EPOCH=$(date -d "$COMMIT_DATE" +%s)
          NOW_EPOCH=$(date +%s)
          AGE=$((NOW_EPOCH - COMMIT_EPOCH))
          AGE_DAYS=$((AGE / 86400))

          echo "Latest commit: $COMMIT_SHA ($AGE_DAYS days ago)"

          if [[ $AGE -lt ${{ env.RELEASE_AGE_THRESHOLD }} ]]; then
            echo "new-release=true" >> $GITHUB_OUTPUT
            echo "New commit detected"
          else
            echo "new-release=false" >> $GITHUB_OUTPUT
            echo "::notice::No new commits in threshold period"
          fi

      - name: Resolve ACE-Step git ref
        id: resolve-ref
        run: |
          if [[ -n "${{ inputs.ACE_STEP_REF }}" ]]; then
            REF="${{ inputs.ACE_STEP_REF }}"
            echo "Using manual ref: $REF"
          else
            echo "Resolving HEAD of main branch..."
            COMMIT=$(git ls-remote "https://github.com/${{ env.ACE_STEP_GITHUB_REPO }}.git" refs/heads/main | cut -f1 | cut -c1-7)
            if [[ -n "$COMMIT" ]]; then
              REF="$COMMIT"
              echo "Resolved main -> $REF"
            else
              echo "::error::Could not resolve HEAD of main branch"
              exit 1
            fi
          fi

          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Resolve ACE-Step UI ref
        id: resolve-ui-ref
        run: |
          REF="${{ inputs.ACE_STEP_UI_REF || env.DEFAULT_ACE_STEP_UI_REF }}"
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "ACE-Step UI ref: $REF"

      - name: Determine if build should run
        id: decision
        run: |
          SECRETS="${{ steps.secrets.outputs.available }}"
          TRIGGER="${{ github.event_name }}"
          RESOLVED_REF="${{ steps.resolve-ref.outputs.ref }}"
          NEW_RELEASE="${{ steps.commit-check.outputs.new-release }}"

          if [[ "$SECRETS" != "true" ]]; then
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping - Required secrets not configured"
          elif [[ "$TRIGGER" == "workflow_dispatch" ]]; then
            # Manual dispatch: always build, but fail fast if no ref could be resolved
            if [[ -z "$RESOLVED_REF" ]]; then
              echo "::error::workflow_dispatch requested a build but no ref could be resolved (manual input empty and commit lookup returned nothing)"
              exit 1
            fi
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Manual build for ref: $RESOLVED_REF"
          elif [[ "$NEW_RELEASE" == "true" ]]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "New commit detected, building ref: $RESOLVED_REF"
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping - No new commits detected"
          fi

  build:
    needs: preflight
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ${{ matrix.arch.runs_on }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        base_image:
          - vastai/pytorch:2.10.0-cu128-cuda-12.9-mini-py311-2026-06-15
        # arm64 is intentionally absent: ACE-Step-1.5's pyproject.toml
        # declares `torchao ; platform_machine == 'aarch64'`, and torchao
        # ships no aarch64 wheels (manylinux_x86_64 only), so the upstream
        # resolver makes the package uninstallable on arm64. Stripping the
        # marker would produce a degraded/broken arm64 image since upstream
        # added torchao deliberately for aarch64. Re-add when torchao ships
        # aarch64 wheels (and update merge-manifests `arches` below).
        arch:
          - { platform: linux/amd64, suffix: amd64, runs_on: ubuntu-latest }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: ./.github/actions/maximize-build-space

      - name: Derive staging tag
        run: |
          PYTORCH_BASE="${{ matrix.base_image }}"
          TAG="${PYTORCH_BASE##*:}"

          CUDA_VERSION=$(echo "$TAG" | sed -n 's/.*cuda-\([0-9.]*\).*/\1/p')
          PYTHON_VERSION=$(echo "$TAG" | sed -n 's/.*-py\([0-9]*\).*/py\1/p')

          if [ -z "$CUDA_VERSION" ] || [ -z "$PYTHON_VERSION" ]; then
            echo "Failed to parse base image: $PYTORCH_BASE"
            exit 1
          fi

          IMAGE_TAG_BASE="${{ inputs.CUSTOM_IMAGE_TAG }}"
          if [ -z "$IMAGE_TAG_BASE" ]; then
            BUILD_DATE=$(date -u +%Y-%m-%d)
            IMAGE_TAG_BASE="${{ needs.preflight.outputs.ace-step-ref }}-${BUILD_DATE}"
          fi

          DOCKERHUB_REPO="${{ inputs.DOCKERHUB_REPO || env.DEFAULT_DOCKERHUB_REPO }}"
          IMAGE_TAG="${IMAGE_TAG_BASE}-cuda-${CUDA_VERSION}-${PYTHON_VERSION}"
          STAGING_TAG_BASE="${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"

          echo "STAGING_TAG_BASE=$STAGING_TAG_BASE" >> $GITHUB_ENV

          echo "Derived staging tag base: $STAGING_TAG_BASE (arch=${{ matrix.arch.suffix }})"

      - name: Build and push arch image to staging
        uses: ./.github/actions/build-arch-image
        with:
          context: derivatives/pytorch/derivatives/ace-step
          arch: ${{ matrix.arch.platform }}
          tag-base: ${{ env.STAGING_TAG_BASE }}
          build-args: |
            PYTORCH_BASE=${{ matrix.base_image }}
            ACE_STEP_REF=${{ needs.preflight.outputs.ace-step-ref }}
            ACE_STEP_UI_REF=${{ needs.preflight.outputs.ace-step-ui-ref }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  merge-manifests:
    needs: [preflight, build]
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && 'production' || '' }}
    strategy:
      fail-fast: false
      matrix:
        base_image:
          - vastai/pytorch:2.10.0-cu128-cuda-12.9-mini-py311-2026-06-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags
        run: |
          PYTORCH_BASE="${{ matrix.base_image }}"
          TAG="${PYTORCH_BASE##*:}"
          CUDA_VERSION=$(echo "$TAG" | sed -n 's/.*cuda-\([0-9.]*\).*/\1/p')
          PYTHON_VERSION=$(echo "$TAG" | sed -n 's/.*-py\([0-9]*\).*/py\1/p')

          IMAGE_TAG_BASE="${{ inputs.CUSTOM_IMAGE_TAG }}"
          if [ -z "$IMAGE_TAG_BASE" ]; then
            BUILD_DATE=$(date -u +%Y-%m-%d)
            IMAGE_TAG_BASE="${{ needs.preflight.outputs.ace-step-ref }}-${BUILD_DATE}"
          fi

          DOCKERHUB_REPO="${{ inputs.DOCKERHUB_REPO || env.DEFAULT_DOCKERHUB_REPO }}"
          IMAGE_TAG="${IMAGE_TAG_BASE}-cuda-${CUDA_VERSION}-${PYTHON_VERSION}"
          STAGING_TAG_BASE="${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"
          PROD_TAG="${{ secrets.DOCKERHUB_NAMESPACE }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"

          echo "STAGING_TAG_BASE=$STAGING_TAG_BASE" >> $GITHUB_ENV
          echo "PROD_TAG=$PROD_TAG" >> $GITHUB_ENV

          MATRIX_ID=$(echo "$PYTORCH_BASE" | md5sum | cut -c1-8)
          echo "MATRIX_ID=$MATRIX_ID" >> $GITHUB_ENV

      - name: Assemble multi-arch index in production
        uses: ./.github/actions/merge-arch-manifests
        with:
          target-tag: ${{ env.PROD_TAG }}
          source-tag-base: ${{ env.STAGING_TAG_BASE }}
          # amd64-only until upstream torchao ships arm64 wheels (see build
          # matrix comment above). Keep the merge step in place so the
          # production tag still resolves through the standard staging->prod
          # path; add `arm64` back to this list when the matrix gains arm64.
          arches: amd64
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Record merged manifest tag
        run: |
          mkdir -p built-tags
          echo "${{ env.PROD_TAG }}" > built-tags/tag-${{ env.MATRIX_ID }}.txt

      - name: Upload manifest tag
        uses: actions/upload-artifact@v4
        with:
          name: built-tag-${{ env.MATRIX_ID }}
          path: built-tags/
          retention-days: 1

  collect-tags:
    needs: [preflight, build, merge-manifests]
    if: always() && needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    outputs:
      all-tags: ${{ steps.collect.outputs.tags }}
    steps:
      - name: Download all tag artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: built-tag-*
          path: all-tags/
          merge-multiple: true

      - name: Aggregate tags
        id: collect
        run: |
          if [ -d all-tags ] && [ "$(ls -A all-tags 2>/dev/null)" ]; then
            # Combine all tag files into JSON array
            TAGS=$(cat all-tags/*.txt | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Found tags: $TAGS"
          else
            echo "::warning::No tags found - build may have failed"
            TAGS="[]"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  notify:
    needs: [preflight, build, merge-manifests, collect-tags]
    if: always() && needs.preflight.outputs.should-run == 'true'
    uses: ./.github/workflows/notify-slack.yml
    with:
      build-result: ${{ needs.merge-manifests.result }}
      image-name: "ACE-Step"
      image-ref: ${{ needs.preflight.outputs.ace-step-ref }}
      image-tags: ${{ needs.collect-tags.outputs.all-tags }}
      trigger: ${{ github.event_name }}
      run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
