# .github/workflows/build-openwebui.yml
# Required repository secrets:
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
#   DOCKERHUB_NAMESPACE          - production namespace (final multi-arch index lives here)
#   DOCKERHUB_NAMESPACE_STAGING  - staging namespace (per-arch build artifacts live here)
# Optional: SLACK_WEBHOOK_URL
#
# Multi-arch strategy: each (base_image, arch) pair builds natively on the
# matching runner (ubuntu-latest for amd64, ubuntu-24.04-arm for arm64) and
# pushes an arch-suffixed tag to the STAGING namespace. A per-base_image
# merge job then uses crane to assemble the multi-arch index at the
# PRODUCTION tag. No QEMU emulation.
#
# Upstream `ghcr.io/open-webui/open-webui:<ver>-cuda` ships multi-arch
# (amd64 + arm64) at every recent version, so the same FROM line works
# unchanged on both runners. Ollama publishes per-arch tarballs at the
# canonical filename `ollama-linux-${ARCH}.tar.zst`; the Dockerfile uses
# `dpkg --print-architecture` to pick the right one.

name: Build Open WebUI Image

on:
  schedule:
    # Run every 12 hours
    - cron: '0 0,12 * * *'

  workflow_dispatch:
    inputs:
      OPENWEBUI_VERSION:
        description: "Open WebUI version (e.g. v0.8.2) - leave empty for latest"
        required: false
      OLLAMA_VERSION:
        description: "Ollama version (e.g. 0.15.2) - leave empty to auto-detect"
        required: false
      DOCKERHUB_REPO:
        description: "Push to username/<repo>"
        required: true
        default: "openwebui"
      CUSTOM_IMAGE_TAG:
        description: "Custom tag (Auto default)"
        required: false

env:
  DEFAULT_DOCKERHUB_REPO: "openwebui"
  # 12 hours
  RELEASE_AGE_THRESHOLD: 43200

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.decision.outputs.should-run }}
      openwebui-version: ${{ steps.openwebui-check.outputs.resolved-version }}
      ollama-version: ${{ steps.decision.outputs.ollama-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for required secrets
        id: secrets
        run: |
          missing=()
          [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]] && missing+=("DOCKERHUB_USERNAME")
          [[ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]] && missing+=("DOCKERHUB_TOKEN")
          [[ -z "${{ secrets.DOCKERHUB_NAMESPACE }}" ]] && missing+=("DOCKERHUB_NAMESPACE")
          [[ -z "${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}" ]] && missing+=("DOCKERHUB_NAMESPACE_STAGING")
          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "Required secrets configured"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping - missing secrets: ${missing[*]}"
          fi

      - name: Check Open WebUI release
        id: openwebui-check
        uses: ./.github/actions/check-ghcr-release
        with:
          owner: open-webui
          package: open-webui
          version-pattern: "^v[0-9]+\\.[0-9]+(\\.[0-9]+)?-cuda$"
          version-extract: "s/-cuda$//"
          age-threshold-seconds: ${{ env.RELEASE_AGE_THRESHOLD }}
          trigger: ${{ github.event_name }}
          manual-version: ${{ inputs.OPENWEBUI_VERSION }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Ollama release
        id: ollama-check
        uses: ./.github/actions/check-github-release
        with:
          repository: ollama/ollama
          tag-pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
          age-threshold-seconds: "999999999"
          trigger: ${{ github.event_name }}
          manual-ref: ${{ inputs.OLLAMA_VERSION && format('v{0}', inputs.OLLAMA_VERSION) || '' }}
          resolve-master-to-commit: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine if build should run
        id: decision
        run: |
          SECRETS="${{ steps.secrets.outputs.available }}"
          NEW_RELEASE="${{ steps.openwebui-check.outputs.new-release }}"
          OPENWEBUI_VERSION="${{ steps.openwebui-check.outputs.resolved-version }}"
          OLLAMA_VERSION="${{ steps.ollama-check.outputs.resolved-ref }}"
          OLLAMA_VERSION="${OLLAMA_VERSION#v}"

          echo "ollama-version=$OLLAMA_VERSION" >> $GITHUB_OUTPUT

          if [[ "$SECRETS" == "true" && "$NEW_RELEASE" == "true" && -n "$OPENWEBUI_VERSION" && -n "$OLLAMA_VERSION" ]]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Building Open WebUI $OPENWEBUI_VERSION with Ollama $OLLAMA_VERSION"
          else
            echo "should-run=false" >> $GITHUB_OUTPUT

            if [[ "$SECRETS" != "true" ]]; then
              echo "::notice::Skipping - Required secrets not configured"
            elif [[ "$NEW_RELEASE" != "true" ]]; then
              echo "::notice::Skipping - No new Open WebUI release detected"
            elif [[ -z "$OPENWEBUI_VERSION" ]]; then
              echo "::notice::Skipping - No Open WebUI version resolved"
            else
              echo "::notice::Skipping - No Ollama version resolved"
            fi
          fi

  build:
    needs: preflight
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ${{ matrix.arch.runs_on }}

    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        base_image:
          - ghcr.io/open-webui/open-webui
        arch:
          - { platform: linux/amd64, suffix: amd64, runs_on: ubuntu-latest }
          - { platform: linux/arm64, suffix: arm64, runs_on: ubuntu-24.04-arm }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: ./.github/actions/maximize-build-space

      - name: GHCR login (for pulling base image)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive staging tag
        run: |
          OPENWEBUI_VERSION="${{ needs.preflight.outputs.openwebui-version }}"
          OLLAMA_VERSION="${{ needs.preflight.outputs.ollama-version }}"
          OPENWEBUI_BASE="${{ matrix.base_image }}:${OPENWEBUI_VERSION}-cuda"
          DOCKERHUB_REPO="${{ inputs.DOCKERHUB_REPO || env.DEFAULT_DOCKERHUB_REPO }}"

          IMAGE_TAG="${{ inputs.CUSTOM_IMAGE_TAG }}"
          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="${OPENWEBUI_VERSION}"
          fi

          STAGING_TAG_BASE="${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"

          echo "OPENWEBUI_BASE=$OPENWEBUI_BASE" >> $GITHUB_ENV
          echo "OLLAMA_VERSION=$OLLAMA_VERSION" >> $GITHUB_ENV
          echo "STAGING_TAG_BASE=$STAGING_TAG_BASE" >> $GITHUB_ENV

          echo "Building from: $OPENWEBUI_BASE (arch=${{ matrix.arch.suffix }})"
          echo "Ollama version: $OLLAMA_VERSION"

      - name: Build and push arch image to staging
        uses: ./.github/actions/build-arch-image
        with:
          context: external/openwebui
          arch: ${{ matrix.arch.platform }}
          tag-base: ${{ env.STAGING_TAG_BASE }}
          build-args: |
            OPENWEBUI_BASE=${{ env.OPENWEBUI_BASE }}
            OLLAMA_VERSION=${{ env.OLLAMA_VERSION }}
          build-contexts: |
            base_image_source=.
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  merge-manifests:
    needs: [preflight, build]
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base_image:
          - ghcr.io/open-webui/open-webui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags
        run: |
          OPENWEBUI_VERSION="${{ needs.preflight.outputs.openwebui-version }}"
          DOCKERHUB_REPO="${{ inputs.DOCKERHUB_REPO || env.DEFAULT_DOCKERHUB_REPO }}"

          IMAGE_TAG="${{ inputs.CUSTOM_IMAGE_TAG }}"
          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="${OPENWEBUI_VERSION}"
          fi

          STAGING_TAG_BASE="${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"
          PROD_TAG="${{ secrets.DOCKERHUB_NAMESPACE }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"

          echo "STAGING_TAG_BASE=$STAGING_TAG_BASE" >> $GITHUB_ENV
          echo "PROD_TAG=$PROD_TAG" >> $GITHUB_ENV

          MATRIX_ID=$(echo "${{ matrix.base_image }}" | md5sum | cut -c1-8)
          echo "MATRIX_ID=$MATRIX_ID" >> $GITHUB_ENV

      - name: Assemble multi-arch index in production
        uses: ./.github/actions/merge-arch-manifests
        with:
          target-tag: ${{ env.PROD_TAG }}
          source-tag-base: ${{ env.STAGING_TAG_BASE }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Record merged manifest tag
        run: |
          mkdir -p built-tags
          echo "${{ env.PROD_TAG }}" > built-tags/tag-${{ env.MATRIX_ID }}.txt

      - name: Upload manifest tag
        uses: actions/upload-artifact@v4
        with:
          name: built-tag-${{ env.MATRIX_ID }}
          path: built-tags/
          retention-days: 1

  collect-tags:
    needs: [preflight, build, merge-manifests]
    if: always() && needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    outputs:
      all-tags: ${{ steps.collect.outputs.tags }}
    steps:
      - name: Download all tag artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: built-tag-*
          path: all-tags/
          merge-multiple: true

      - name: Aggregate tags
        id: collect
        run: |
          if [[ -d all-tags ]] && [[ "$(ls -A all-tags 2>/dev/null)" ]]; then
            TAGS=$(cat all-tags/*.txt | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Found tags: $TAGS"
          else
            echo "::warning::No tags found - build may have failed"
            TAGS="[]"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  notify:
    needs: [preflight, build, merge-manifests, collect-tags]
    if: always() && needs.preflight.outputs.should-run == 'true'
    uses: ./.github/workflows/notify-slack.yml
    with:
      build-result: ${{ needs.merge-manifests.result }}
      image-name: "Open WebUI"
      image-ref: ${{ needs.preflight.outputs.openwebui-version }}
      image-tags: ${{ needs.collect-tags.outputs.all-tags }}
      trigger: ${{ github.event_name }}
      run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
