# Build Llama.cpp image - works on main repo (scheduled + manual) and forks (manual)
# Required repository secrets:
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
#   DOCKERHUB_NAMESPACE          - production namespace (final multi-arch index lives here)
#   DOCKERHUB_NAMESPACE_STAGING  - staging namespace (per-arch build artifacts live here)
# Optional: SLACK_WEBHOOK_URL
#
# Release detection: Polls GitHub (ai-dock/llama.cpp-cuda) for new release tags.
#
# Multi-arch strategy: each (base_image, arch) pair builds natively on the
# matching runner (ubuntu-latest for amd64, ubuntu-24.04-arm for arm64) and
# pushes an arch-suffixed tag to the STAGING namespace. A per-base_image
# merge job then uses crane to assemble the multi-arch index at the
# PRODUCTION tag. No QEMU emulation.
#
# Upstream `ai-dock/llama.cpp-cuda` now publishes both amd64 and arm64
# tarballs per release (since release b9264+). The Dockerfile picks the
# right one via `dpkg --print-architecture`, so the same Dockerfile build
# path runs identically on both runner arches.

name: Build Llama.cpp Image

on:
  schedule:
    # Run weekly on Monday
    - cron: '0 0 * * 1'

  workflow_dispatch:
    inputs:
      LLAMA_CPP_VERSION:
        description: "Release tag (e.g. b5460) - leave empty for latest"
        required: false
      CUDA_VERSION:
        description: "CUDA version for binary package"
        required: false
        default: "12.8"
      DOCKERHUB_REPO:
        description: "Push to namespace/<repo>"
        required: true
        default: "llama-cpp"
      CUSTOM_IMAGE_TAG:
        description: "Custom tag (Auto default)"
        required: false

env:
  DEFAULT_DOCKERHUB_REPO: "llama-cpp"
  DEFAULT_CUDA_VERSION: "12.8"
  # 7 days
  RELEASE_AGE_THRESHOLD: 604800

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.decision.outputs.should-run }}
      llama-cpp-version: ${{ steps.release-check.outputs.resolved-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for required secrets
        id: secrets
        run: |
          missing=()
          [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]] && missing+=("DOCKERHUB_USERNAME")
          [[ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]] && missing+=("DOCKERHUB_TOKEN")
          [[ -z "${{ secrets.DOCKERHUB_NAMESPACE }}" ]] && missing+=("DOCKERHUB_NAMESPACE")
          [[ -z "${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}" ]] && missing+=("DOCKERHUB_NAMESPACE_STAGING")
          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "Required secrets configured"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping - missing secrets: ${missing[*]}"
          fi

      - name: Check GitHub for new release
        id: release-check
        uses: ./.github/actions/check-github-release
        with:
          repository: ai-dock/llama.cpp-cuda
          age-threshold-seconds: ${{ env.RELEASE_AGE_THRESHOLD }}
          trigger: ${{ github.event_name }}
          manual-ref: ${{ inputs.LLAMA_CPP_VERSION }}
          resolve-master-to-commit: "false"

      - name: Determine if build should run
        id: decision
        run: |
          SECRETS="${{ steps.secrets.outputs.available }}"
          NEW_RELEASE="${{ steps.release-check.outputs.new-release }}"
          VERSION="${{ steps.release-check.outputs.resolved-ref }}"

          if [[ "$SECRETS" == "true" && "$NEW_RELEASE" == "true" && -n "$VERSION" ]]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Building Llama.cpp $VERSION"
          else
            echo "should-run=false" >> $GITHUB_OUTPUT

            if [[ "$SECRETS" != "true" ]]; then
              echo "::notice::Skipping - Required secrets not configured"
            elif [[ "$NEW_RELEASE" != "true" ]]; then
              echo "::notice::Skipping - No new release detected"
            else
              echo "::notice::Skipping - No version resolved"
            fi
          fi

  build:
    needs: preflight
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ${{ matrix.arch.runs_on }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        base_image:
          - vastai/base-image:cuda-12.9-mini-py312-2026-06-12
        arch:
          - { platform: linux/amd64, suffix: amd64, runs_on: ubuntu-latest }
          - { platform: linux/arm64, suffix: arm64, runs_on: ubuntu-24.04-arm }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: ./.github/actions/maximize-build-space

      - name: Derive staging tag
        run: |
          BASE_IMAGE="${{ matrix.base_image }}"
          TAG="${BASE_IMAGE##*:}"

          # Extract CUDA runtime version from cuda-X.Y
          CUDA_VERSION=$(echo "$TAG" | sed -n 's/.*cuda-\([0-9.]*\).*/\1/p')
          if [[ -z "$CUDA_VERSION" ]]; then
            echo "::error::Failed to parse base image: $BASE_IMAGE"
            exit 1
          fi

          LLAMA_CPP_VERSION="${{ needs.preflight.outputs.llama-cpp-version }}"
          CUDA_BIN_VERSION="${{ inputs.CUDA_VERSION || env.DEFAULT_CUDA_VERSION }}"

          IMAGE_TAG="${{ inputs.CUSTOM_IMAGE_TAG }}"
          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="${LLAMA_CPP_VERSION}-cuda-${CUDA_VERSION}"
          fi

          DOCKERHUB_REPO="${{ inputs.DOCKERHUB_REPO || env.DEFAULT_DOCKERHUB_REPO }}"
          STAGING_TAG_BASE="${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"

          echo "CUDA_BIN_VERSION=$CUDA_BIN_VERSION" >> $GITHUB_ENV
          echo "STAGING_TAG_BASE=$STAGING_TAG_BASE" >> $GITHUB_ENV

          echo "Derived staging tag base: $STAGING_TAG_BASE (arch=${{ matrix.arch.suffix }})"

      - name: Build and push arch image to staging
        uses: ./.github/actions/build-arch-image
        with:
          context: derivatives/llama-cpp
          arch: ${{ matrix.arch.platform }}
          tag-base: ${{ env.STAGING_TAG_BASE }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            LLAMA_CPP_VERSION=${{ needs.preflight.outputs.llama-cpp-version }}
            CUDA_VERSION=${{ env.CUDA_BIN_VERSION }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  merge-manifests:
    needs: [preflight, build]
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && 'production' || '' }}
    strategy:
      fail-fast: false
      matrix:
        base_image:
          - vastai/base-image:cuda-12.9-mini-py312-2026-06-12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags
        run: |
          BASE_IMAGE="${{ matrix.base_image }}"
          TAG="${BASE_IMAGE##*:}"
          CUDA_VERSION=$(echo "$TAG" | sed -n 's/.*cuda-\([0-9.]*\).*/\1/p')

          LLAMA_CPP_VERSION="${{ needs.preflight.outputs.llama-cpp-version }}"
          IMAGE_TAG="${{ inputs.CUSTOM_IMAGE_TAG }}"
          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="${LLAMA_CPP_VERSION}-cuda-${CUDA_VERSION}"
          fi

          DOCKERHUB_REPO="${{ inputs.DOCKERHUB_REPO || env.DEFAULT_DOCKERHUB_REPO }}"
          STAGING_TAG_BASE="${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"
          PROD_TAG="${{ secrets.DOCKERHUB_NAMESPACE }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"

          echo "STAGING_TAG_BASE=$STAGING_TAG_BASE" >> $GITHUB_ENV
          echo "PROD_TAG=$PROD_TAG" >> $GITHUB_ENV

          MATRIX_ID=$(echo "$BASE_IMAGE" | md5sum | cut -c1-8)
          echo "MATRIX_ID=$MATRIX_ID" >> $GITHUB_ENV

      - name: Assemble multi-arch index in production
        uses: ./.github/actions/merge-arch-manifests
        with:
          target-tag: ${{ env.PROD_TAG }}
          source-tag-base: ${{ env.STAGING_TAG_BASE }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Record merged manifest tag
        run: |
          mkdir -p built-tags
          echo "${{ env.PROD_TAG }}" > built-tags/tag-${{ env.MATRIX_ID }}.txt

      - name: Upload manifest tag
        uses: actions/upload-artifact@v4
        with:
          name: built-tag-${{ env.MATRIX_ID }}
          path: built-tags/
          retention-days: 1

  collect-tags:
    needs: [preflight, build, merge-manifests]
    if: always() && needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    outputs:
      all-tags: ${{ steps.collect.outputs.tags }}
    steps:
      - name: Download all tag artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: built-tag-*
          path: all-tags/
          merge-multiple: true

      - name: Aggregate tags
        id: collect
        run: |
          if [ -d all-tags ] && [ "$(ls -A all-tags 2>/dev/null)" ]; then
            TAGS=$(cat all-tags/*.txt | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Found tags: $TAGS"
          else
            echo "::warning::No tags found - build may have failed"
            TAGS="[]"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  notify:
    needs: [preflight, build, merge-manifests, collect-tags]
    if: always() && needs.preflight.outputs.should-run == 'true'
    uses: ./.github/workflows/notify-slack.yml
    with:
      build-result: ${{ needs.merge-manifests.result }}
      image-name: "Llama.cpp"
      image-ref: ${{ needs.preflight.outputs.llama-cpp-version }}
      image-tags: ${{ needs.collect-tags.outputs.all-tags }}
      trigger: ${{ github.event_name }}
      run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
