# Promote staging PyTorch images to production by retagging (no rebuild)
# Retags dated staging images to clean production tags
# All promotions run sequentially in a single job to ensure ordering
# Required repository secrets:
# DOCKERHUB_USERNAME
# DOCKERHUB_TOKEN
# DOCKERHUB_NAMESPACE_STAGING
# DOCKERHUB_NAMESPACE
# Optional:
# SLACK_WEBHOOK_URL

name: Promote PyTorch

on:
  workflow_dispatch:
    inputs:
      STAGING_DATE:
        description: "Date suffix to promote (e.g. 2026-03-06)"
        required: true
        type: string
      PYTORCH_VERSION:
        description: "PyTorch version to promote (e.g. 2.10.0)"
        required: true
        type: string
      LATEST_TORCH:
        description: "Create auto-tags (set true for the latest torch version)"
        required: false
        default: false
        type: boolean
      FILTER:
        description: "Filter configs by pattern (e.g. cu128, mini)"
        required: false
        default: ""
      DRY_RUN:
        description: "Print what would be promoted without promoting"
        required: false
        default: false
        type: boolean

concurrency:
  group: pytorch-promote
  cancel-in-progress: false

jobs:
  generate-configs:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.configs.outputs.configs }}
      mini-configs: ${{ steps.configs.outputs.mini-configs }}
      has-mini: ${{ steps.configs.outputs.has-mini }}
    steps:
      - name: Generate filtered config list
        id: configs
        env:
          NAMESPACE_PROD: ${{ secrets.DOCKERHUB_NAMESPACE }}
          STAGING_DATE: ${{ inputs.STAGING_DATE }}
        run: |
          PYTORCH_VERSION="${{ inputs.PYTORCH_VERSION }}"
          FILTER="${{ inputs.FILTER }}"
          LATEST_TORCH="${{ inputs.LATEST_TORCH }}"
          DEFAULT_PYTHON="312"

          # Config format: key|cuda_ver|torch_backend|arches|python_versions
          # Mini format: key|mini_base_tag|torch_backend|python_versions
          case "$PYTORCH_VERSION" in
            2.6.0)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64,linux/arm64|310 311 312 313"
              )
              MINI_CONFIGS=()  ;;
            2.7.1)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64|310 311 312 313"
                "cu128|12.8.1-cudnn-devel|cu128|linux/amd64,linux/arm64|310 311 312 313"
              )
              MINI_CONFIGS=()  ;;
            2.8.0)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64|310 311 312 313"
                "cu128|12.8.1-cudnn-devel|cu128|linux/amd64|310 311 312 313"
                "cu129|12.9.1-cudnn-devel|cu129|linux/amd64|310 311 312 313"
              )
              MINI_CONFIGS=()  ;;
            2.9.0)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64|310 311 312 313 314"
                "cu128|12.8.1-cudnn-devel|cu128|linux/amd64,linux/arm64|310 311 312 313 314"
                "cu130|13.0.2-cudnn-devel|cu130|linux/amd64,linux/arm64|310 311 312 313 314"
              )
              MINI_CONFIGS=()  ;;
            2.9.1|2.10.0)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64|310 311 312 313 314"
                "cu128|12.8.1-cudnn-devel|cu128|linux/amd64,linux/arm64|310 311 312 313 314"
                "cu130|13.0.2-cudnn-devel|cu130|linux/amd64,linux/arm64|310 311 312 313 314"
              )
              MINI_CONFIGS=(
                "cu128-mini|cuda-12.9-mini|cu128|310 311 312"
                "cu130-mini|cuda-13.1-mini|cu130|310 311 312"
              )  ;;
            *)
              echo "::error::Unknown PYTORCH_VERSION: $PYTORCH_VERSION"
              exit 1  ;;
          esac

          CONFIGS_JSON="[]"

          for config in "${CONFIGS[@]}"; do
            IFS='|' read -r key cuda_ver torch_backend arches python_versions <<< "$config"

            if [[ -n "$FILTER" && "$key" != *"$FILTER"* ]]; then
              continue
            fi

            cuda_short="${cuda_ver%%-*}"

            CONFIGS_JSON=$(echo "$CONFIGS_JSON" | jq -c \
              --arg key "$key" \
              --arg cuda_short "$cuda_short" \
              --arg python_versions "$python_versions" \
              '. + [{"key": $key, "cuda_short": $cuda_short, "python_versions": $python_versions}]')
          done

          # Mini configs
          MINI_CONFIGS_JSON="[]"
          for mini_config in "${MINI_CONFIGS[@]}"; do
            IFS='|' read -r key mini_base_tag torch_backend python_versions <<< "$mini_config"

            if [[ -n "$FILTER" && "$key" != *"$FILTER"* && "mini" != *"$FILTER"* ]]; then
              continue
            fi

            cuda_minor="${mini_base_tag#cuda-}"
            cuda_minor="${cuda_minor%-mini}"

            MINI_CONFIGS_JSON=$(echo "$MINI_CONFIGS_JSON" | jq -c \
              --arg key "$key" \
              --arg torch_backend "$torch_backend" \
              --arg cuda_minor "$cuda_minor" \
              --arg python_versions "$python_versions" \
              '. + [{"key": $key, "torch_backend": $torch_backend, "cuda_minor": $cuda_minor, "python_versions": $python_versions}]')
          done

          if [[ ${#MINI_CONFIGS[@]} -gt 0 && $(echo "$MINI_CONFIGS_JSON" | jq length) -gt 0 ]]; then
            echo "has-mini=true" >> $GITHUB_OUTPUT
          else
            echo "has-mini=false" >> $GITHUB_OUTPUT
          fi

          {
            echo "configs<<CONFIGS_EOF"
            echo "${CONFIGS_JSON}"
            echo "CONFIGS_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "mini-configs<<MINI_CONFIGS_EOF"
            echo "${MINI_CONFIGS_JSON}"
            echo "MINI_CONFIGS_EOF"
          } >> $GITHUB_OUTPUT
          echo "Configs: $(echo "$CONFIGS_JSON" | jq length)"
          echo "Mini configs: $(echo "$MINI_CONFIGS_JSON" | jq length)"

  promote:
    needs: generate-configs
    if: ${{ !inputs.DRY_RUN }}
    runs-on: ubuntu-latest
    environment: production
    outputs:
      all-tags: ${{ steps.collect.outputs.tags }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote all images sequentially
        env:
          NAMESPACE_STAGING: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          NAMESPACE_PROD: ${{ secrets.DOCKERHUB_NAMESPACE }}
          STAGING_DATE: ${{ inputs.STAGING_DATE }}
          PYTORCH_VERSION: ${{ inputs.PYTORCH_VERSION }}
          LATEST_TORCH: ${{ inputs.LATEST_TORCH }}
          CONFIGS: ${{ needs.generate-configs.outputs.configs }}
          MINI_CONFIGS: ${{ needs.generate-configs.outputs.mini-configs }}
          HAS_MINI: ${{ needs.generate-configs.outputs.has-mini }}
        run: |
          set -euo pipefail
          DEFAULT_PYTHON="312"
          mkdir -p built-tags

          # Promote full images
          echo "=== Promoting PyTorch ${PYTORCH_VERSION} full images ==="
          CONFIG_COUNT=$(echo "$CONFIGS" | jq length)
          for ((i=0; i<CONFIG_COUNT; i++)); do
            key=$(echo "$CONFIGS" | jq -r ".[$i].key")
            cuda_short=$(echo "$CONFIGS" | jq -r ".[$i].cuda_short")
            python_versions=$(echo "$CONFIGS" | jq -r ".[$i].python_versions")

            echo ""
            echo "--- Config: ${key} (cuda-${cuda_short}) ---"

            for py_tag in ${python_versions}; do
              SOURCE="${NAMESPACE_STAGING}/pytorch:${PYTORCH_VERSION}-cuda-${cuda_short}-py${py_tag}-24.04-${STAGING_DATE}"
              DATED_TAG="${NAMESPACE_PROD}/pytorch:${PYTORCH_VERSION}-cuda-${cuda_short}-py${py_tag}-24.04-${STAGING_DATE}"

              EXTRA_TAGS=""
              if [[ "$py_tag" == "$DEFAULT_PYTHON" ]]; then
                # Default python alias (no -pyXXX, but keeps date)
                DATED_ALIAS="${NAMESPACE_PROD}/pytorch:${PYTORCH_VERSION}-cuda-${cuda_short}-24.04-${STAGING_DATE}"
                EXTRA_TAGS="--tag ${DATED_ALIAS}"
                echo "$DATED_ALIAS" >> built-tags/tags.txt
              fi

              echo "Promoting: ${SOURCE} -> ${DATED_TAG}"
              docker buildx imagetools create \
                --tag "${DATED_TAG}" \
                ${EXTRA_TAGS} \
                "${SOURCE}"

              echo "$DATED_TAG" >> built-tags/tags.txt
            done
          done

          # Promote mini variants
          if [[ "$HAS_MINI" == "true" ]]; then
            echo ""
            echo "=== Promoting PyTorch ${PYTORCH_VERSION} mini variants ==="
            MINI_COUNT=$(echo "$MINI_CONFIGS" | jq length)

            for ((i=0; i<MINI_COUNT; i++)); do
              torch_backend=$(echo "$MINI_CONFIGS" | jq -r ".[$i].torch_backend")
              cuda_minor=$(echo "$MINI_CONFIGS" | jq -r ".[$i].cuda_minor")
              python_versions=$(echo "$MINI_CONFIGS" | jq -r ".[$i].python_versions")

              for py_tag in ${python_versions}; do
                SOURCE="${NAMESPACE_STAGING}/pytorch:${PYTORCH_VERSION}-${torch_backend}-cuda-${cuda_minor}-mini-py${py_tag}-${STAGING_DATE}"
                DATED_TAG="${NAMESPACE_PROD}/pytorch:${PYTORCH_VERSION}-${torch_backend}-cuda-${cuda_minor}-mini-py${py_tag}-${STAGING_DATE}"

                echo "Promoting mini: ${SOURCE} -> ${DATED_TAG}"
                docker buildx imagetools create \
                  --tag "${DATED_TAG}" \
                  "${SOURCE}"

                echo "$DATED_TAG" >> built-tags/tags.txt
              done
            done
          fi

          # Auto convenience tags MUST be created last.
          # The Vast.ai @vastai-automatic-tag backend resolves to the most
          # recently pushed image for a given CUDA version. These auto tags
          # point to the default Python variant (py312) so they must be
          # the final push to ensure correct resolution ordering.
          echo ""
          echo "=== Creating auto convenience tags (must be last) ==="
          if [[ "$LATEST_TORCH" == "true" ]]; then
            # Auto-tag map: target_tag|source_cuda_short
            AUTO_TAG_MAP=(
              "cuda-12.1.1-auto|12.6.3"
              "cuda-12.4.1-auto|12.6.3"
              "cuda-12.6.3-auto|12.6.3"
              "cuda-12.8.1-auto|12.8.1"
              "cuda-12.9.1-auto|12.8.1"
              "cuda-13.0.2-auto|13.0.2"
            )

            # Collect available CUDA versions from configs
            AVAILABLE_CUDA=()
            for ((i=0; i<CONFIG_COUNT; i++)); do
              AVAILABLE_CUDA+=($(echo "$CONFIGS" | jq -r ".[$i].cuda_short"))
            done

            for entry in "${AUTO_TAG_MAP[@]}"; do
              IFS='|' read -r auto_tag source_cuda <<< "$entry"

              # Only create auto-tag if we have a config with this CUDA version
              found=false
              for avail in "${AVAILABLE_CUDA[@]}"; do
                [[ "$avail" == "$source_cuda" ]] && found=true && break
              done
              [[ "$found" != "true" ]] && continue

              SOURCE="${NAMESPACE_PROD}/pytorch:${PYTORCH_VERSION}-cuda-${source_cuda}-py${DEFAULT_PYTHON}-24.04-${STAGING_DATE}"
              TARGET="${NAMESPACE_PROD}/pytorch:${auto_tag}"

              echo "Auto-tag: ${SOURCE} -> ${TARGET}"
              docker buildx imagetools create \
                --tag "${TARGET}" \
                "${SOURCE}"

              echo "$TARGET" >> built-tags/tags.txt
            done
          else
            echo "  (skipped - LATEST_TORCH not set)"
          fi

          echo ""
          echo "=== Promotion complete ==="

      - name: Collect all tags
        id: collect
        run: |
          if [ -d built-tags ] && [ "$(ls -A built-tags 2>/dev/null)" ]; then
            TAGS=$(cat built-tags/*.txt | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Found $(echo $TAGS | jq length) unique tags"
          else
            echo "::warning::No tags found"
            TAGS="[]"
          fi
          {
            echo "tags<<TAGS_EOF"
            echo "$TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT

  dry-run:
    needs: generate-configs
    if: ${{ inputs.DRY_RUN }}
    runs-on: ubuntu-latest
    steps:
      - name: Print promotion plan
        env:
          STAGING_DATE: ${{ inputs.STAGING_DATE }}
          PYTORCH_VERSION: ${{ inputs.PYTORCH_VERSION }}
          LATEST_TORCH: ${{ inputs.LATEST_TORCH }}
          NAMESPACE_STAGING: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          NAMESPACE_PROD: ${{ secrets.DOCKERHUB_NAMESPACE }}
          CONFIGS: ${{ needs.generate-configs.outputs.configs }}
          MINI_CONFIGS: ${{ needs.generate-configs.outputs.mini-configs }}
          HAS_MINI: ${{ needs.generate-configs.outputs.has-mini }}
        run: |
          DEFAULT_PYTHON="312"

          echo "=== DRY RUN - PyTorch Promotion Plan ==="
          echo "PyTorch version: $PYTORCH_VERSION"
          echo "Staging date: $STAGING_DATE"
          echo ""

          echo "=== Full Image Promotions (in order) ==="
          CONFIG_COUNT=$(echo "$CONFIGS" | jq length)
          for ((i=0; i<CONFIG_COUNT; i++)); do
            key=$(echo "$CONFIGS" | jq -r ".[$i].key")
            cuda_short=$(echo "$CONFIGS" | jq -r ".[$i].cuda_short")
            python_versions=$(echo "$CONFIGS" | jq -r ".[$i].python_versions")

            echo ""
            echo "--- ${key} (cuda-${cuda_short}) ---"
            for py_tag in ${python_versions}; do
              echo "  ${NAMESPACE_STAGING}/pytorch:${PYTORCH_VERSION}-cuda-${cuda_short}-py${py_tag}-24.04-${STAGING_DATE}"
              echo "    -> ${NAMESPACE_PROD}/pytorch:${PYTORCH_VERSION}-cuda-${cuda_short}-py${py_tag}-24.04-${STAGING_DATE}"
            done
            echo "  + default python alias:"
            echo "    -> ${NAMESPACE_PROD}/pytorch:${PYTORCH_VERSION}-cuda-${cuda_short}-24.04-${STAGING_DATE} (alias for py${DEFAULT_PYTHON})"
          done

          if [[ "$HAS_MINI" == "true" ]]; then
            echo ""
            echo "=== Mini Promotions ==="
            MINI_COUNT=$(echo "$MINI_CONFIGS" | jq length)
            for ((i=0; i<MINI_COUNT; i++)); do
              torch_backend=$(echo "$MINI_CONFIGS" | jq -r ".[$i].torch_backend")
              cuda_minor=$(echo "$MINI_CONFIGS" | jq -r ".[$i].cuda_minor")
              python_versions=$(echo "$MINI_CONFIGS" | jq -r ".[$i].python_versions")
              for py_tag in ${python_versions}; do
                echo "  ${NAMESPACE_STAGING}/pytorch:${PYTORCH_VERSION}-${torch_backend}-cuda-${cuda_minor}-mini-py${py_tag}-${STAGING_DATE}"
                echo "    -> ${NAMESPACE_PROD}/pytorch:${PYTORCH_VERSION}-${torch_backend}-cuda-${cuda_minor}-mini-py${py_tag}-${STAGING_DATE}"
              done
            done
          fi

          echo ""
          echo "=== Auto Tags (created last for @vastai-automatic-tag resolution) ==="
          if [[ "$LATEST_TORCH" == "true" ]]; then
            AUTO_TAG_MAP=(
              "cuda-12.1.1-auto|12.6.3"
              "cuda-12.4.1-auto|12.6.3"
              "cuda-12.6.3-auto|12.6.3"
              "cuda-12.8.1-auto|12.8.1"
              "cuda-12.9.1-auto|12.8.1"
              "cuda-13.0.2-auto|13.0.2"
            )

            AVAILABLE_CUDA=()
            for ((i=0; i<CONFIG_COUNT; i++)); do
              AVAILABLE_CUDA+=($(echo "$CONFIGS" | jq -r ".[$i].cuda_short"))
            done

            for entry in "${AUTO_TAG_MAP[@]}"; do
              IFS='|' read -r auto_tag source_cuda <<< "$entry"
              found=false
              for avail in "${AVAILABLE_CUDA[@]}"; do
                [[ "$avail" == "$source_cuda" ]] && found=true && break
              done
              [[ "$found" != "true" ]] && continue

              echo "  ${NAMESPACE_PROD}/pytorch:${PYTORCH_VERSION}-cuda-${source_cuda}-py${DEFAULT_PYTHON}-24.04-${STAGING_DATE} -> ${NAMESPACE_PROD}/pytorch:${auto_tag}"
            done
          else
            echo "  (skipped - LATEST_TORCH not set)"
          fi

  notify:
    needs: [generate-configs, promote]
    if: always() && !inputs.DRY_RUN
    uses: ./.github/workflows/notify-slack.yml
    with:
      build-result: ${{ needs.promote.result }}
      image-name: "PyTorch ${{ inputs.PYTORCH_VERSION }} (Production)"
      image-ref: ${{ inputs.STAGING_DATE }}
      image-tags: ${{ needs.promote.outputs.all-tags || '[]' }}
      trigger: ${{ github.event_name }}
      run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
