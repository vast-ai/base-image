# .github/workflows/build-vllm.yml
# Required repository secrets:
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
#   DOCKERHUB_NAMESPACE          - production namespace (final multi-arch index lives here)
#   DOCKERHUB_NAMESPACE_STAGING  - staging namespace (per-arch build artifacts live here)
# Optional: SLACK_WEBHOOK_URL
#
# Multi-arch strategy: each (variant, arch) pair builds natively on the
# matching runner (ubuntu-latest for amd64, ubuntu-24.04-arm for arm64) and
# pushes an arch-suffixed tag to the STAGING namespace. A per-variant merge
# job then uses crane to assemble the multi-arch index at the PRODUCTION tag.
# No QEMU emulation.

name: Build vLLM Image

on:
  schedule:
    # Run every 12 hours
    - cron: '0 0,12 * * *'

  workflow_dispatch:
    inputs:
      VLLM_VERSION:
        description: "vLLM version (e.g. v0.14.0, or 'nightly') - leave empty for latest"
        required: false
      DOCKERHUB_REPO:
        description: "Push to username/<repo>"
        required: true
        default: "vllm"
      CUSTOM_IMAGE_TAG:
        description: "Custom tag (Auto default)"
        required: false

env:
  DEFAULT_DOCKERHUB_REPO: "vllm"
  # 12 hours
  RELEASE_AGE_THRESHOLD: 43200

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.decision.outputs.should-run }}
      vllm-version: ${{ steps.nightly-check.outputs.is-nightly == 'true' && steps.nightly-check.outputs.version || steps.release-check.outputs.resolved-version }}
      build-matrix: ${{ steps.expand.outputs.build-matrix }}
      merge-matrix: ${{ steps.expand.outputs.merge-matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for required secrets
        id: secrets
        run: |
          missing=()
          [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]] && missing+=("DOCKERHUB_USERNAME")
          [[ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]] && missing+=("DOCKERHUB_TOKEN")
          [[ -z "${{ secrets.DOCKERHUB_NAMESPACE }}" ]] && missing+=("DOCKERHUB_NAMESPACE")
          [[ -z "${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}" ]] && missing+=("DOCKERHUB_NAMESPACE_STAGING")
          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "Required secrets configured"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping - missing secrets: ${missing[*]}"
          fi

      - name: Handle nightly build
        id: nightly-check
        if: inputs.VLLM_VERSION == 'nightly'
        run: |
          echo "is-nightly=true" >> $GITHUB_OUTPUT
          echo "version=nightly-$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo 'matrix=[{"tag":"nightly","cuda":"12.9"}]' >> $GITHUB_OUTPUT
          echo "Nightly build requested - skipping version matching"

      - name: Check release and resolve version
        id: release-check
        if: inputs.VLLM_VERSION != 'nightly'
        uses: ./.github/actions/check-dockerhub-release
        with:
          repository: vllm/vllm-openai
          version-pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
          age-threshold-seconds: ${{ env.RELEASE_AGE_THRESHOLD }}
          trigger: ${{ github.event_name }}
          manual-version: ${{ inputs.VLLM_VERSION }}

      - name: Build matrix from variant tags
        id: build-matrix
        if: inputs.VLLM_VERSION != 'nightly' && steps.release-check.outputs.new-release == 'true'
        run: |
          VERSION="${{ steps.release-check.outputs.resolved-version }}"

          echo "Building matrix for version: $VERSION"

          # Write to temp file first to avoid shell interpolation issues
          cat << 'VARIANTS_EOF' > /tmp/variants.json
          ${{ steps.release-check.outputs.variant-tags }}
          VARIANTS_EOF

          VARIANTS=$(cat /tmp/variants.json)
          echo "Available variants: $VARIANTS"

          # Convert variant tags to build matrix.
          # Prefer explicit -cuNNN suffixes. As of v0.20.1 vLLM stopped
          # publishing -cu130 entirely, so the unsuffixed base tag now IS
          # the CUDA 13.0 image. Treat the bare $VERSION tag as CUDA 13.0
          # only when no explicit -cu130 variant exists, so older releases
          # that still ship both don't produce duplicate CUDA 13.0 builds.
          MATRIX=$(echo "$VARIANTS" | jq -c --arg version "$VERSION" '
            map(
              # Skip arch-specific tags (we use multi-arch builds)
              select(test("-(x86_64|aarch64)") | not)
              # Skip ubuntu2404 (and any other non-CUDA) variants
              | select(test("-ubuntu") | not)
            )
            | . as $variants
            | ($variants | any(endswith("-cu130"))) as $has_cu130
            | $variants
            | map(
              if endswith("-cu130") then
                {tag: ., cuda: "13.0"}
              elif endswith("-cu129") then
                {tag: ., cuda: "12.9"}
              elif endswith("-cu128") then
                {tag: ., cuda: "12.8"}
              elif . == $version and ($has_cu130 | not) then
                {tag: ., cuda: "13.0"}
              else
                empty
              end
            )
          ')

          echo "Build matrix: $MATRIX"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          MATRIX_SIZE=$(echo "$MATRIX" | jq 'length')
          if [[ "$MATRIX_SIZE" -eq 0 ]]; then
            echo "::error::No valid image variants found for $VERSION"
            exit 1
          fi

          echo "Will build $MATRIX_SIZE image(s)"

      - name: Determine if build should run
        id: decision
        run: |
          SECRETS="${{ steps.secrets.outputs.available }}"

          if [[ "${{ steps.nightly-check.outputs.is-nightly }}" == "true" ]]; then
            if [[ "$SECRETS" == "true" ]]; then
              echo "should-run=true" >> $GITHUB_OUTPUT
              echo "Building nightly"
            else
              echo "should-run=false" >> $GITHUB_OUTPUT
              echo "::notice::Skipping - Required secrets not configured"
            fi
            exit 0
          fi

          NEW_RELEASE="${{ steps.release-check.outputs.new-release }}"
          MATRIX='${{ steps.build-matrix.outputs.matrix }}'
          MATRIX_SIZE=$(echo "${MATRIX:-[]}" | jq 'length // 0')

          if [[ "$SECRETS" == "true" && "$NEW_RELEASE" == "true" && "$MATRIX_SIZE" -gt 0 ]]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Building $MATRIX_SIZE image(s) for ${{ steps.release-check.outputs.resolved-version }}"
          else
            echo "should-run=false" >> $GITHUB_OUTPUT

            if [[ "$SECRETS" != "true" ]]; then
              echo "::notice::Skipping - Required secrets not configured"
            elif [[ "$NEW_RELEASE" != "true" ]]; then
              echo "::notice::Skipping - No new release detected"
            else
              echo "::notice::Skipping - No valid image variants found"
            fi
          fi

      - name: Expand matrix with arch axis
        id: expand
        if: steps.decision.outputs.should-run == 'true'
        run: |
          MERGE_MATRIX='${{ steps.nightly-check.outputs.is-nightly == 'true' && steps.nightly-check.outputs.matrix || steps.build-matrix.outputs.matrix }}'

          # Cross-product the variants matrix with native-runner arch entries.
          # Each build job pulls matrix.arch.{platform,suffix,runs_on}.
          ARCHES_JSON='[
            {"platform": "linux/amd64", "suffix": "amd64", "runs_on": "ubuntu-latest"},
            {"platform": "linux/arm64", "suffix": "arm64", "runs_on": "ubuntu-24.04-arm"}
          ]'
          BUILD_MATRIX=$(echo "$MERGE_MATRIX" | jq -c --argjson arches "$ARCHES_JSON" '
            [.[] as $v | $arches[] as $a | $v + {arch: $a}]
          ')

          echo "Merge matrix: $MERGE_MATRIX"
          echo "Build matrix: $BUILD_MATRIX"

          echo "merge-matrix=$MERGE_MATRIX" >> $GITHUB_OUTPUT
          echo "build-matrix=$BUILD_MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: preflight
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ${{ matrix.arch.runs_on }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.preflight.outputs.build-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: ./.github/actions/maximize-build-space

      - name: Derive staging tag
        run: |
          VERSION="${{ needs.preflight.outputs.vllm-version }}"
          VLLM_BASE="vllm/vllm-openai:${{ matrix.tag }}"
          DOCKERHUB_REPO="${{ inputs.DOCKERHUB_REPO || env.DEFAULT_DOCKERHUB_REPO }}"

          IMAGE_TAG_BASE="${{ inputs.CUSTOM_IMAGE_TAG }}"
          if [[ -z "$IMAGE_TAG_BASE" ]]; then
            IMAGE_TAG_BASE="$VERSION"
          fi

          # Format: v0.14.0-cuda-12.9
          IMAGE_TAG="${IMAGE_TAG_BASE}-cuda-${{ matrix.cuda }}"
          STAGING_TAG_BASE="${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"

          echo "VLLM_BASE=$VLLM_BASE" >> $GITHUB_ENV
          echo "STAGING_TAG_BASE=$STAGING_TAG_BASE" >> $GITHUB_ENV

          echo "Building from: $VLLM_BASE (arch=${{ matrix.arch.suffix }})"

      - name: Build and push arch image to staging
        uses: ./.github/actions/build-arch-image
        with:
          context: external/vllm
          arch: ${{ matrix.arch.platform }}
          tag-base: ${{ env.STAGING_TAG_BASE }}
          build-args: |
            VLLM_BASE=${{ env.VLLM_BASE }}
          build-contexts: |
            base_image_source=.
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

  merge-manifests:
    needs: [preflight, build]
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && 'production' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.preflight.outputs.merge-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags
        run: |
          VERSION="${{ needs.preflight.outputs.vllm-version }}"
          DOCKERHUB_REPO="${{ inputs.DOCKERHUB_REPO || env.DEFAULT_DOCKERHUB_REPO }}"

          IMAGE_TAG_BASE="${{ inputs.CUSTOM_IMAGE_TAG }}"
          if [[ -z "$IMAGE_TAG_BASE" ]]; then
            IMAGE_TAG_BASE="$VERSION"
          fi

          IMAGE_TAG="${IMAGE_TAG_BASE}-cuda-${{ matrix.cuda }}"
          STAGING_TAG_BASE="${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"
          PROD_TAG="${{ secrets.DOCKERHUB_NAMESPACE }}/${DOCKERHUB_REPO}:${IMAGE_TAG}"

          echo "STAGING_TAG_BASE=$STAGING_TAG_BASE" >> $GITHUB_ENV
          echo "PROD_TAG=$PROD_TAG" >> $GITHUB_ENV

          MATRIX_ID=$(echo "${{ matrix.tag }}" | md5sum | cut -c1-8)
          echo "MATRIX_ID=$MATRIX_ID" >> $GITHUB_ENV

      - name: Assemble multi-arch index in production
        uses: ./.github/actions/merge-arch-manifests
        with:
          target-tag: ${{ env.PROD_TAG }}
          source-tag-base: ${{ env.STAGING_TAG_BASE }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Record merged manifest tag
        run: |
          mkdir -p built-tags
          echo "${{ env.PROD_TAG }}" > built-tags/tag-${{ env.MATRIX_ID }}.txt

      - name: Upload manifest tag
        uses: actions/upload-artifact@v4
        with:
          name: built-tag-${{ env.MATRIX_ID }}
          path: built-tags/
          retention-days: 1

  collect-tags:
    needs: [preflight, build, merge-manifests]
    if: always() && needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    outputs:
      all-tags: ${{ steps.collect.outputs.tags }}
    steps:
      - name: Download all tag artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: built-tag-*
          path: all-tags/
          merge-multiple: true

      - name: Aggregate tags
        id: collect
        run: |
          if [[ -d all-tags ]] && [[ "$(ls -A all-tags 2>/dev/null)" ]]; then
            TAGS=$(cat all-tags/*.txt | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Found tags: $TAGS"
          else
            echo "::warning::No tags found - build may have failed"
            TAGS="[]"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  notify:
    needs: [preflight, build, merge-manifests, collect-tags]
    if: always() && needs.preflight.outputs.should-run == 'true'
    uses: ./.github/workflows/notify-slack.yml
    with:
      build-result: ${{ needs.merge-manifests.result }}
      image-name: "vLLM"
      image-ref: ${{ needs.preflight.outputs.vllm-version }}
      image-tags: ${{ needs.collect-tags.outputs.all-tags }}
      trigger: ${{ github.event_name }}
      run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
