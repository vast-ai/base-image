# Extend existing production PyTorch images with updated overlay files (no full rebuild)
# Sources from dated production images, overlays ROOT + portal, pushes to staging
# The resulting staging images can be promoted using the promote-pytorch workflow
# Required repository secrets:
# DOCKERHUB_USERNAME
# DOCKERHUB_TOKEN
# DOCKERHUB_NAMESPACE_STAGING
# DOCKERHUB_NAMESPACE
# Optional:
# SLACK_WEBHOOK_URL

name: Extend PyTorch

on:
  workflow_dispatch:
    inputs:
      SOURCE_DATE:
        description: "Production date tag to extend (e.g. 2026-03-18)"
        required: true
        type: string
      PYTORCH_VERSION:
        description: "PyTorch version to extend (e.g. 2.10.0)"
        required: true
        type: string
      FILTER:
        description: "Filter configs by pattern (e.g. cu128, mini)"
        required: false
        default: ""
      DRY_RUN:
        description: "Print what would build without building"
        required: false
        default: false
        type: boolean

concurrency:
  group: pytorch-extend-${{ inputs.PYTORCH_VERSION }}
  cancel-in-progress: false

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.matrix.outputs.build-matrix }}
      merge-matrix: ${{ steps.matrix.outputs.merge-matrix }}
      mini-build-matrix: ${{ steps.matrix.outputs.mini-build-matrix }}
      mini-merge-matrix: ${{ steps.matrix.outputs.mini-merge-matrix }}
      has-mini: ${{ steps.matrix.outputs.has-mini }}
      build-date: ${{ steps.matrix.outputs.build-date }}
    steps:
      - name: Generate matrices
        id: matrix
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%d)
          echo "build-date=$BUILD_DATE" >> $GITHUB_OUTPUT

          PYTORCH_VERSION="${{ inputs.PYTORCH_VERSION }}"
          FILTER="${{ inputs.FILTER }}"
          DEFAULT_PYTHON="312"

          # Config format: key|cuda_ver|torch_backend|arches|python_versions
          # Mini format: key|mini_base_tag|torch_backend|python_versions
          case "$PYTORCH_VERSION" in
            2.6.0)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64,linux/arm64|310 311 312 313"
              )
              MINI_CONFIGS=()  ;;
            2.7.1)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64|310 311 312 313"
                "cu128|12.8.1-cudnn-devel|cu128|linux/amd64,linux/arm64|310 311 312 313"
              )
              MINI_CONFIGS=()  ;;
            2.8.0)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64|310 311 312 313"
                "cu128|12.8.1-cudnn-devel|cu128|linux/amd64|310 311 312 313"
                "cu129|12.9.1-cudnn-devel|cu129|linux/amd64|310 311 312 313"
              )
              MINI_CONFIGS=()  ;;
            2.9.0)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64|310 311 312 313 314"
                "cu128|12.8.1-cudnn-devel|cu128|linux/amd64,linux/arm64|310 311 312 313 314"
                "cu130|13.0.2-cudnn-devel|cu130|linux/amd64,linux/arm64|310 311 312 313 314"
              )
              MINI_CONFIGS=()  ;;
            2.9.1|2.10.0)
              CONFIGS=(
                "cu126|12.6.3-cudnn-devel|cu126|linux/amd64|310 311 312 313 314"
                "cu128|12.8.1-cudnn-devel|cu128|linux/amd64,linux/arm64|310 311 312 313 314"
                "cu130|13.0.2-cudnn-devel|cu130|linux/amd64,linux/arm64|310 311 312 313 314"
              )
              MINI_CONFIGS=(
                "cu128-mini|cuda-12.9-mini|cu128|310 311 312"
                "cu130-mini|cuda-13.1-mini|cu130|310 311 312"
              )  ;;
            *)
              echo "::error::Unknown PYTORCH_VERSION: $PYTORCH_VERSION"
              exit 1  ;;
          esac

          BUILD_MATRIX="[]"
          MERGE_MATRIX="[]"

          for config in "${CONFIGS[@]}"; do
            IFS='|' read -r key cuda_ver torch_backend arches python_versions <<< "$config"

            if [[ -n "$FILTER" && "$key" != *"$FILTER"* ]]; then
              continue
            fi

            cuda_short="${cuda_ver%%-*}"

            MERGE_MATRIX=$(echo "$MERGE_MATRIX" | jq -c \
              --arg key "$key" \
              --arg cuda_short "$cuda_short" \
              --arg arches "$arches" \
              --arg python_versions "$python_versions" \
              '. + [{"config_key": $key, "cuda_short": $cuda_short, "arches": $arches, "python_versions": $python_versions}]')

            IFS=',' read -ra ARCH_LIST <<< "$arches"
            for arch in "${ARCH_LIST[@]}"; do
              arch_suffix="${arch#linux/}"
              BUILD_MATRIX=$(echo "$BUILD_MATRIX" | jq -c \
                --arg key "$key" \
                --arg cuda_short "$cuda_short" \
                --arg arch "$arch" \
                --arg arch_suffix "$arch_suffix" \
                --arg python_versions "$python_versions" \
                '. + [{"config_key": $key, "cuda_short": $cuda_short, "arch": $arch, "arch_suffix": $arch_suffix, "python_versions": $python_versions}]')
            done
          done

          # Mini configs
          MINI_BUILD_MATRIX="[]"
          MINI_MERGE_MATRIX="[]"

          for mini_config in "${MINI_CONFIGS[@]}"; do
            IFS='|' read -r key mini_base_tag torch_backend python_versions <<< "$mini_config"

            if [[ -n "$FILTER" && "$key" != *"$FILTER"* && "mini" != *"$FILTER"* ]]; then
              continue
            fi

            cuda_minor="${mini_base_tag#cuda-}"
            cuda_minor="${cuda_minor%-mini}"

            MINI_MERGE_MATRIX=$(echo "$MINI_MERGE_MATRIX" | jq -c \
              --arg key "$key" \
              --arg torch_backend "$torch_backend" \
              --arg cuda_minor "$cuda_minor" \
              --arg python_versions "$python_versions" \
              '. + [{"config_key": $key, "torch_backend": $torch_backend, "cuda_minor": $cuda_minor, "python_versions": $python_versions}]')

            for arch in "linux/amd64" "linux/arm64"; do
              arch_suffix="${arch#linux/}"
              MINI_BUILD_MATRIX=$(echo "$MINI_BUILD_MATRIX" | jq -c \
                --arg key "$key" \
                --arg torch_backend "$torch_backend" \
                --arg cuda_minor "$cuda_minor" \
                --arg arch "$arch" \
                --arg arch_suffix "$arch_suffix" \
                --arg python_versions "$python_versions" \
                '. + [{"config_key": $key, "torch_backend": $torch_backend, "cuda_minor": $cuda_minor, "arch": $arch, "arch_suffix": $arch_suffix, "python_versions": $python_versions}]')
            done
          done

          if [[ ${#MINI_CONFIGS[@]} -gt 0 && $(echo "$MINI_BUILD_MATRIX" | jq length) -gt 0 ]]; then
            echo "has-mini=true" >> $GITHUB_OUTPUT
          else
            echo "has-mini=false" >> $GITHUB_OUTPUT
          fi

          echo "build-matrix={\"include\":$(echo $BUILD_MATRIX)}" >> $GITHUB_OUTPUT
          echo "merge-matrix={\"include\":$(echo $MERGE_MATRIX)}" >> $GITHUB_OUTPUT
          echo "mini-build-matrix={\"include\":$(echo $MINI_BUILD_MATRIX)}" >> $GITHUB_OUTPUT
          echo "mini-merge-matrix={\"include\":$(echo $MINI_MERGE_MATRIX)}" >> $GITHUB_OUTPUT

          echo "Build matrix entries: $(echo $BUILD_MATRIX | jq length)"
          echo "Mini build matrix entries: $(echo $MINI_BUILD_MATRIX | jq length)"
          echo "Build date: $BUILD_DATE"

  extend:
    needs: generate-matrix
    if: ${{ !inputs.DRY_RUN }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extend all Python versions
        env:
          NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PROD_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          PYTORCH_VERSION: ${{ inputs.PYTORCH_VERSION }}
          CUDA_SHORT: ${{ matrix.cuda_short }}
          ARCH: ${{ matrix.arch }}
          ARCH_SUFFIX: ${{ matrix.arch_suffix }}
          PYTHON_VERSIONS: ${{ matrix.python_versions }}
          SOURCE_DATE: ${{ inputs.SOURCE_DATE }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          DEFAULT_PYTHON="312"
          mkdir -p built-tags

          for py_tag in ${PYTHON_VERSIONS}; do
            # Source from dated production image, output to staging
            SOURCE="${PROD_NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-py${py_tag}-24.04-${SOURCE_DATE}"
            PRIMARY_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-py${py_tag}-24.04-${BUILD_DATE}-${ARCH_SUFFIX}"

            TAGS="--tag ${PRIMARY_TAG}"

            if [[ "$py_tag" == "$DEFAULT_PYTHON" ]]; then
              ALIAS_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-24.04-${BUILD_DATE}-${ARCH_SUFFIX}"
              TAGS+=" --tag ${ALIAS_TAG}"
              echo "$ALIAS_TAG" >> built-tags/tags.txt
            fi

            echo "=== Extending pytorch ${PYTORCH_VERSION} cuda-${CUDA_SHORT} py${py_tag} for ${ARCH} ==="
            echo "    Source: ${SOURCE}"
            docker buildx build \
              --progress=plain \
              --platform "${ARCH}" \
              -f Dockerfile.extend \
              --build-arg BASE_IMAGE="${SOURCE}" \
              ${TAGS} \
              --push .

            echo "$PRIMARY_TAG" >> built-tags/tags.txt
          done

      - name: Upload built tags
        uses: actions/upload-artifact@v4
        with:
          name: built-tags-${{ matrix.config_key }}-${{ matrix.arch_suffix }}
          path: built-tags/
          retention-days: 1

  merge-manifests:
    needs: [generate-matrix, extend]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.merge-matrix) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Merge arch manifests
        env:
          NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PYTORCH_VERSION: ${{ inputs.PYTORCH_VERSION }}
          CUDA_SHORT: ${{ matrix.cuda_short }}
          ARCHES: ${{ matrix.arches }}
          PYTHON_VERSIONS: ${{ matrix.python_versions }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          DEFAULT_PYTHON="312"
          mkdir -p built-tags

          IFS=',' read -ra ARCH_LIST <<< "$ARCHES"

          for py_tag in ${PYTHON_VERSIONS}; do
            FINAL_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-py${py_tag}-24.04-${BUILD_DATE}"
            AMD64_TAG="${FINAL_TAG}-amd64"

            EXTRA_TAGS=""
            if [[ "$py_tag" == "$DEFAULT_PYTHON" ]]; then
              ALIAS_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-24.04-${BUILD_DATE}"
              EXTRA_TAGS="-t ${ALIAS_TAG}"
              echo "$ALIAS_TAG" >> built-tags/tags.txt
            fi

            echo "=== Merging manifest: ${FINAL_TAG} ==="
            if [[ ${#ARCH_LIST[@]} -gt 1 ]]; then
              ARM64_TAG="${FINAL_TAG}-arm64"
              docker buildx imagetools create \
                -t "${FINAL_TAG}" \
                ${EXTRA_TAGS} \
                "${AMD64_TAG}" "${ARM64_TAG}"
            else
              docker buildx imagetools create \
                -t "${FINAL_TAG}" \
                ${EXTRA_TAGS} \
                "${AMD64_TAG}"
            fi

            echo "$FINAL_TAG" >> built-tags/tags.txt
          done

      - name: Upload manifest tags
        uses: actions/upload-artifact@v4
        with:
          name: manifest-tags-${{ matrix.config_key }}
          path: built-tags/
          retention-days: 1

  extend-mini:
    needs: [generate-matrix, merge-manifests]
    if: ${{ needs.generate-matrix.outputs.has-mini == 'true' && !inputs.DRY_RUN }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.mini-build-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extend mini Python versions
        env:
          NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PROD_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          PYTORCH_VERSION: ${{ inputs.PYTORCH_VERSION }}
          TORCH_BACKEND: ${{ matrix.torch_backend }}
          CUDA_MINOR: ${{ matrix.cuda_minor }}
          ARCH: ${{ matrix.arch }}
          ARCH_SUFFIX: ${{ matrix.arch_suffix }}
          PYTHON_VERSIONS: ${{ matrix.python_versions }}
          SOURCE_DATE: ${{ inputs.SOURCE_DATE }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          mkdir -p built-tags

          for py_tag in ${PYTHON_VERSIONS}; do
            # Source from dated production image, output to staging
            SOURCE="${PROD_NAMESPACE}/pytorch:${PYTORCH_VERSION}-${TORCH_BACKEND}-cuda-${CUDA_MINOR}-mini-py${py_tag}-${SOURCE_DATE}"
            TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-${TORCH_BACKEND}-cuda-${CUDA_MINOR}-mini-py${py_tag}-${BUILD_DATE}-${ARCH_SUFFIX}"

            echo "=== Extending mini: pytorch ${PYTORCH_VERSION} ${TORCH_BACKEND} cuda-${CUDA_MINOR}-mini py${py_tag} for ${ARCH} ==="
            echo "    Source: ${SOURCE}"
            docker buildx build \
              --progress=plain \
              --platform "${ARCH}" \
              -f Dockerfile.extend \
              --build-arg BASE_IMAGE="${SOURCE}" \
              --tag "${TAG}" \
              --push .

            echo "$TAG" >> built-tags/tags.txt
          done

      - name: Upload mini tags
        uses: actions/upload-artifact@v4
        with:
          name: mini-tags-${{ matrix.config_key }}-${{ matrix.arch_suffix }}
          path: built-tags/
          retention-days: 1

  merge-mini-manifests:
    needs: [generate-matrix, extend-mini]
    if: ${{ needs.generate-matrix.outputs.has-mini == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.mini-merge-matrix) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Merge mini manifests
        env:
          NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PYTORCH_VERSION: ${{ inputs.PYTORCH_VERSION }}
          TORCH_BACKEND: ${{ matrix.torch_backend }}
          CUDA_MINOR: ${{ matrix.cuda_minor }}
          PYTHON_VERSIONS: ${{ matrix.python_versions }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          mkdir -p built-tags

          for py_tag in ${PYTHON_VERSIONS}; do
            FINAL_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-${TORCH_BACKEND}-cuda-${CUDA_MINOR}-mini-py${py_tag}-${BUILD_DATE}"
            AMD64_TAG="${FINAL_TAG}-amd64"
            ARM64_TAG="${FINAL_TAG}-arm64"

            echo "=== Merging mini manifest: ${FINAL_TAG} ==="
            docker buildx imagetools create \
              -t "${FINAL_TAG}" \
              "${AMD64_TAG}" "${ARM64_TAG}"

            echo "$FINAL_TAG" >> built-tags/tags.txt
          done

      - name: Upload mini manifest tags
        uses: actions/upload-artifact@v4
        with:
          name: mini-manifest-tags-${{ matrix.config_key }}
          path: built-tags/
          retention-days: 1

  collect-tags:
    needs: [generate-matrix, extend, merge-manifests, extend-mini, merge-mini-manifests]
    if: always() && !inputs.DRY_RUN
    runs-on: ubuntu-latest
    outputs:
      all-tags: ${{ steps.collect.outputs.tags }}
    steps:
      - name: Download all tag artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{built-tags-*,manifest-tags-*,mini-tags-*,mini-manifest-tags-*}"
          path: all-tags/

      - name: Aggregate tags
        id: collect
        run: |
          if [ -d all-tags ] && [ "$(ls -A all-tags 2>/dev/null)" ]; then
            TAGS=$(find all-tags -name '*.txt' -exec cat {} + | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Found $(echo $TAGS | jq length) unique tags"
          else
            echo "::warning::No tags found - extend may have failed"
            TAGS="[]"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

  dry-run:
    needs: generate-matrix
    if: ${{ inputs.DRY_RUN }}
    runs-on: ubuntu-latest
    steps:
      - name: Print extend plan
        env:
          BUILD_MATRIX: ${{ needs.generate-matrix.outputs.build-matrix }}
          MERGE_MATRIX: ${{ needs.generate-matrix.outputs.merge-matrix }}
          MINI_BUILD_MATRIX: ${{ needs.generate-matrix.outputs.mini-build-matrix }}
          HAS_MINI: ${{ needs.generate-matrix.outputs.has-mini }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
          SOURCE_DATE: ${{ inputs.SOURCE_DATE }}
          PYTORCH_VERSION: ${{ inputs.PYTORCH_VERSION }}
          NAMESPACE_STAGING: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PROD_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
        run: |
          DEFAULT_PYTHON="312"

          echo "=== DRY RUN - PyTorch Extend Plan ==="
          echo "PyTorch version: $PYTORCH_VERSION"
          echo "Source (prod): ${PROD_NAMESPACE}/pytorch:*-${SOURCE_DATE}"
          echo "Target (staging): ${NAMESPACE_STAGING}/pytorch:*-${BUILD_DATE}"
          echo ""

          echo "=== Extend Jobs ==="
          echo "$BUILD_MATRIX" | jq -r '.include[] | "  \(.config_key) [\(.arch_suffix)] cuda-\(.cuda_short)"'
          echo ""

          echo "=== Tags that would be created ==="
          for entry in $(echo "$MERGE_MATRIX" | jq -c '.include[]'); do
            cuda_short=$(echo "$entry" | jq -r '.cuda_short')
            python_versions=$(echo "$entry" | jq -r '.python_versions')
            arches=$(echo "$entry" | jq -r '.arches')
            for py_tag in ${python_versions}; do
              echo "  ${PROD_NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${cuda_short}-py${py_tag}-24.04-${SOURCE_DATE}"
              echo "    -> ${NAMESPACE_STAGING}/pytorch:${PYTORCH_VERSION}-cuda-${cuda_short}-py${py_tag}-24.04-${BUILD_DATE}"
            done
            echo "  + alias: ${NAMESPACE_STAGING}/pytorch:${PYTORCH_VERSION}-cuda-${cuda_short}-24.04-${BUILD_DATE} (from py${DEFAULT_PYTHON})"
            echo "  [arches: ${arches}]"
            echo ""
          done

          if [[ "$HAS_MINI" == "true" ]]; then
            echo "=== Mini Extend Jobs ==="
            echo "$MINI_BUILD_MATRIX" | jq -r '.include[] | "  \(.config_key) [\(.arch_suffix)] \(.torch_backend) cuda-\(.cuda_minor)-mini"'
            echo ""

            echo "=== Mini Tags ==="
            for entry in $(echo "$MINI_BUILD_MATRIX" | jq -c '.include[] | select(.arch_suffix == "amd64")'); do
              torch_backend=$(echo "$entry" | jq -r '.torch_backend')
              cuda_minor=$(echo "$entry" | jq -r '.cuda_minor')
              python_versions=$(echo "$entry" | jq -r '.python_versions')
              for py_tag in ${python_versions}; do
                echo "  ${PROD_NAMESPACE}/pytorch:${PYTORCH_VERSION}-${torch_backend}-cuda-${cuda_minor}-mini-py${py_tag}-${SOURCE_DATE}"
                echo "    -> ${NAMESPACE_STAGING}/pytorch:${PYTORCH_VERSION}-${torch_backend}-cuda-${cuda_minor}-mini-py${py_tag}-${BUILD_DATE}"
              done
            done
          else
            echo "=== No mini builds for this PyTorch version ==="
          fi

  notify:
    needs: [generate-matrix, extend, merge-manifests, collect-tags]
    if: always() && !inputs.DRY_RUN
    uses: ./.github/workflows/notify-slack.yml
    with:
      build-result: ${{ needs.extend.result }}
      image-name: "PyTorch ${{ inputs.PYTORCH_VERSION }} (Extended)"
      image-ref: "${{ inputs.SOURCE_DATE }} -> ${{ needs.generate-matrix.outputs.build-date }}"
      image-tags: ${{ needs.collect-tags.outputs.all-tags || '[]' }}
      trigger: ${{ github.event_name }}
      run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
