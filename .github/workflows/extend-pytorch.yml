# Extend existing production PyTorch images with updated overlay files (no full rebuild)
# Sources from dated production images, overlays ROOT + portal, pushes to staging
# Extends all torch versions (2.6.0 through 2.11.0) in one run
# The resulting staging images can be promoted using the promote-pytorch workflow
# Required repository secrets:
# DOCKERHUB_USERNAME
# DOCKERHUB_TOKEN
# DOCKERHUB_NAMESPACE_STAGING
# DOCKERHUB_NAMESPACE
# Optional:
# SLACK_WEBHOOK_URL

name: Extend PyTorch

on:
  workflow_dispatch:
    inputs:
      SOURCE_DATE:
        description: "Production date tag to extend (e.g. 2026-03-18)"
        required: true
        type: string
      FILTER:
        description: "Filter by version or config key (e.g. 2.10, cu128, mini)"
        required: false
        default: ""
      DRY_RUN:
        description: "Print what would build without building"
        required: false
        default: false
        type: boolean

concurrency:
  group: pytorch-extend
  cancel-in-progress: false

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.matrix.outputs.build-matrix }}
      merge-matrix: ${{ steps.matrix.outputs.merge-matrix }}
      mini-build-matrix: ${{ steps.matrix.outputs.mini-build-matrix }}
      mini-merge-matrix: ${{ steps.matrix.outputs.mini-merge-matrix }}
      has-mini: ${{ steps.matrix.outputs.has-mini }}
      build-date: ${{ steps.matrix.outputs.build-date }}
    steps:
      - name: Generate matrices
        id: matrix
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%d)
          echo "build-date=$BUILD_DATE" >> $GITHUB_OUTPUT

          FILTER="${{ inputs.FILTER }}"
          DEFAULT_PYTHON="312"

          # All pytorch versions — extend sources from prod, no base_image needed
          # Format: torch_ver|key|cuda_short|arches|python_versions
          ALL_CONFIGS=(
            "2.6.0|cu126|12.6.3|linux/amd64,linux/arm64|310 311 312 313"
            "2.7.1|cu126|12.6.3|linux/amd64|310 311 312 313"
            "2.7.1|cu128|12.8.1|linux/amd64,linux/arm64|310 311 312 313"
            "2.8.0|cu126|12.6.3|linux/amd64|310 311 312 313"
            "2.8.0|cu128|12.8.1|linux/amd64|310 311 312 313"
            "2.8.0|cu129|12.9.1|linux/amd64|310 311 312 313"
            "2.9.1|cu126|12.6.3|linux/amd64|310 311 312 313 314"
            "2.9.1|cu128|12.8.1|linux/amd64,linux/arm64|310 311 312 313 314"
            "2.9.1|cu130|13.0.2|linux/amd64,linux/arm64|310 311 312 313 314"
            "2.10.0|cu126|12.6.3|linux/amd64|310 311 312 313 314"
            "2.10.0|cu128|12.8.1|linux/amd64,linux/arm64|310 311 312 313 314"
            "2.10.0|cu130|13.0.2|linux/amd64,linux/arm64|310 311 312 313 314"
            "2.11.0|cu126|12.6.3|linux/amd64|310 311 312 313 314"
            "2.11.0|cu128|12.8.1|linux/amd64,linux/arm64|310 311 312 313 314"
            "2.11.0|cu130|13.0.2|linux/amd64,linux/arm64|310 311 312 313 314"
          )

          # Mini format: torch_ver|key|torch_backend|cuda_minor|arches|python_versions
          ALL_MINI_CONFIGS=(
            "2.6.0|cu126-mini|cu126|12.9|linux/amd64,linux/arm64|310 311 312"
            "2.7.1|cu128-mini|cu128|12.9|linux/amd64,linux/arm64|310 311 312"
            "2.8.0|cu128-mini|cu128|12.9|linux/amd64|310 311 312"
            "2.9.1|cu128-mini|cu128|12.9|linux/amd64,linux/arm64|310 311 312"
            "2.9.1|cu130-mini|cu130|13.1|linux/amd64,linux/arm64|310 311 312"
            "2.10.0|cu128-mini|cu128|12.9|linux/amd64,linux/arm64|310 311 312"
            "2.10.0|cu130-mini|cu130|13.1|linux/amd64,linux/arm64|310 311 312"
            "2.11.0|cu128-mini|cu128|12.9|linux/amd64,linux/arm64|310 311 312"
            "2.11.0|cu130-mini|cu130|13.1|linux/amd64,linux/arm64|310 311 312"
          )

          BUILD_MATRIX="[]"
          MERGE_MATRIX="[]"

          for config in "${ALL_CONFIGS[@]}"; do
            IFS='|' read -r torch_ver key cuda_short arches python_versions <<< "$config"

            if [[ -n "$FILTER" && "$torch_ver" != *"$FILTER"* && "$key" != *"$FILTER"* ]]; then
              continue
            fi

            MERGE_MATRIX=$(echo "$MERGE_MATRIX" | jq -c \
              --arg torch_ver "$torch_ver" \
              --arg key "$key" \
              --arg cuda_short "$cuda_short" \
              --arg arches "$arches" \
              --arg python_versions "$python_versions" \
              '. + [{"torch_version": $torch_ver, "config_key": $key, "cuda_short": $cuda_short, "arches": $arches, "python_versions": $python_versions}]')

            IFS=',' read -ra ARCH_LIST <<< "$arches"
            for arch in "${ARCH_LIST[@]}"; do
              arch_suffix="${arch#linux/}"
              BUILD_MATRIX=$(echo "$BUILD_MATRIX" | jq -c \
                --arg torch_ver "$torch_ver" \
                --arg key "$key" \
                --arg cuda_short "$cuda_short" \
                --arg arch "$arch" \
                --arg arch_suffix "$arch_suffix" \
                --arg python_versions "$python_versions" \
                '. + [{"torch_version": $torch_ver, "config_key": $key, "cuda_short": $cuda_short, "arch": $arch, "arch_suffix": $arch_suffix, "python_versions": $python_versions}]')
            done
          done

          MINI_BUILD_MATRIX="[]"
          MINI_MERGE_MATRIX="[]"

          for mini_config in "${ALL_MINI_CONFIGS[@]}"; do
            IFS='|' read -r torch_ver key torch_backend cuda_minor arches python_versions <<< "$mini_config"

            if [[ -n "$FILTER" && "$torch_ver" != *"$FILTER"* && "$key" != *"$FILTER"* && "mini" != *"$FILTER"* ]]; then
              continue
            fi

            MINI_MERGE_MATRIX=$(echo "$MINI_MERGE_MATRIX" | jq -c \
              --arg torch_ver "$torch_ver" \
              --arg key "$key" \
              --arg torch_backend "$torch_backend" \
              --arg cuda_minor "$cuda_minor" \
              --arg arches "$arches" \
              --arg python_versions "$python_versions" \
              '. + [{"torch_version": $torch_ver, "config_key": $key, "torch_backend": $torch_backend, "cuda_minor": $cuda_minor, "arches": $arches, "python_versions": $python_versions}]')

            IFS=',' read -ra ARCH_LIST <<< "$arches"
            for arch in "${ARCH_LIST[@]}"; do
              arch_suffix="${arch#linux/}"
              MINI_BUILD_MATRIX=$(echo "$MINI_BUILD_MATRIX" | jq -c \
                --arg torch_ver "$torch_ver" \
                --arg key "$key" \
                --arg torch_backend "$torch_backend" \
                --arg cuda_minor "$cuda_minor" \
                --arg arch "$arch" \
                --arg arch_suffix "$arch_suffix" \
                --arg python_versions "$python_versions" \
                '. + [{"torch_version": $torch_ver, "config_key": $key, "torch_backend": $torch_backend, "cuda_minor": $cuda_minor, "arch": $arch, "arch_suffix": $arch_suffix, "python_versions": $python_versions}]')
            done
          done

          if [[ $(echo "$MINI_BUILD_MATRIX" | jq length) -gt 0 ]]; then
            echo "has-mini=true" >> $GITHUB_OUTPUT
          else
            echo "has-mini=false" >> $GITHUB_OUTPUT
          fi

          {
            echo "build-matrix<<BUILD_MATRIX_EOF"
            echo "{\"include\":${BUILD_MATRIX}}"
            echo "BUILD_MATRIX_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "merge-matrix<<MERGE_MATRIX_EOF"
            echo "{\"include\":${MERGE_MATRIX}}"
            echo "MERGE_MATRIX_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "mini-build-matrix<<MINI_BUILD_MATRIX_EOF"
            echo "{\"include\":${MINI_BUILD_MATRIX}}"
            echo "MINI_BUILD_MATRIX_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "mini-merge-matrix<<MINI_MERGE_MATRIX_EOF"
            echo "{\"include\":${MINI_MERGE_MATRIX}}"
            echo "MINI_MERGE_MATRIX_EOF"
          } >> $GITHUB_OUTPUT

          echo "Build matrix entries: $(echo "$BUILD_MATRIX" | jq length)"
          echo "Mini build matrix entries: $(echo "$MINI_BUILD_MATRIX" | jq length)"
          echo "Build date: $BUILD_DATE"

  extend:
    needs: generate-matrix
    if: ${{ !inputs.DRY_RUN }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extend all Python versions
        env:
          NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PROD_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          PYTORCH_VERSION: ${{ matrix.torch_version }}
          CUDA_SHORT: ${{ matrix.cuda_short }}
          ARCH: ${{ matrix.arch }}
          ARCH_SUFFIX: ${{ matrix.arch_suffix }}
          PYTHON_VERSIONS: ${{ matrix.python_versions }}
          SOURCE_DATE: ${{ inputs.SOURCE_DATE }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          DEFAULT_PYTHON="312"
          mkdir -p built-tags

          for py_tag in ${PYTHON_VERSIONS}; do
            SOURCE="${PROD_NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-py${py_tag}-24.04-${SOURCE_DATE}"
            PRIMARY_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-py${py_tag}-24.04-${BUILD_DATE}-${ARCH_SUFFIX}"

            TAGS="--tag ${PRIMARY_TAG}"

            if [[ "$py_tag" == "$DEFAULT_PYTHON" ]]; then
              ALIAS_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-24.04-${BUILD_DATE}-${ARCH_SUFFIX}"
              TAGS+=" --tag ${ALIAS_TAG}"
              echo "$ALIAS_TAG" >> built-tags/tags.txt
            fi

            echo "=== Extending pytorch ${PYTORCH_VERSION} cuda-${CUDA_SHORT} py${py_tag} for ${ARCH} ==="
            echo "    Source: ${SOURCE}"
            docker buildx build \
              --progress=plain \
              --platform "${ARCH}" \
              -f Dockerfile.extend \
              --build-arg BASE_IMAGE="${SOURCE}" \
              ${TAGS} \
              --push .

            echo "$PRIMARY_TAG" >> built-tags/tags.txt
          done

      - name: Upload built tags
        uses: actions/upload-artifact@v4
        with:
          name: built-tags-${{ matrix.torch_version }}-${{ matrix.config_key }}-${{ matrix.arch_suffix }}
          path: built-tags/
          retention-days: 1

  merge-manifests:
    needs: [generate-matrix, extend]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.merge-matrix) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Merge arch manifests
        env:
          NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PYTORCH_VERSION: ${{ matrix.torch_version }}
          CUDA_SHORT: ${{ matrix.cuda_short }}
          ARCHES: ${{ matrix.arches }}
          PYTHON_VERSIONS: ${{ matrix.python_versions }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          DEFAULT_PYTHON="312"
          mkdir -p built-tags

          IFS=',' read -ra ARCH_LIST <<< "$ARCHES"

          for py_tag in ${PYTHON_VERSIONS}; do
            FINAL_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-py${py_tag}-24.04-${BUILD_DATE}"
            AMD64_TAG="${FINAL_TAG}-amd64"

            EXTRA_TAGS=""
            if [[ "$py_tag" == "$DEFAULT_PYTHON" ]]; then
              ALIAS_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-cuda-${CUDA_SHORT}-24.04-${BUILD_DATE}"
              EXTRA_TAGS="-t ${ALIAS_TAG}"
              echo "$ALIAS_TAG" >> built-tags/tags.txt
            fi

            echo "=== Merging manifest: ${FINAL_TAG} ==="
            if [[ ${#ARCH_LIST[@]} -gt 1 ]]; then
              ARM64_TAG="${FINAL_TAG}-arm64"
              docker buildx imagetools create \
                -t "${FINAL_TAG}" \
                ${EXTRA_TAGS} \
                "${AMD64_TAG}" "${ARM64_TAG}"
            else
              docker buildx imagetools create \
                -t "${FINAL_TAG}" \
                ${EXTRA_TAGS} \
                "${AMD64_TAG}"
            fi

            echo "$FINAL_TAG" >> built-tags/tags.txt
          done

      - name: Upload manifest tags
        uses: actions/upload-artifact@v4
        with:
          name: manifest-tags-${{ matrix.torch_version }}-${{ matrix.config_key }}
          path: built-tags/
          retention-days: 1

  extend-mini:
    needs: [generate-matrix, merge-manifests]
    if: ${{ needs.generate-matrix.outputs.has-mini == 'true' && !inputs.DRY_RUN }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.mini-build-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extend mini Python versions
        env:
          NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PROD_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
          PYTORCH_VERSION: ${{ matrix.torch_version }}
          TORCH_BACKEND: ${{ matrix.torch_backend }}
          CUDA_MINOR: ${{ matrix.cuda_minor }}
          ARCH: ${{ matrix.arch }}
          ARCH_SUFFIX: ${{ matrix.arch_suffix }}
          PYTHON_VERSIONS: ${{ matrix.python_versions }}
          SOURCE_DATE: ${{ inputs.SOURCE_DATE }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          mkdir -p built-tags

          for py_tag in ${PYTHON_VERSIONS}; do
            SOURCE="${PROD_NAMESPACE}/pytorch:${PYTORCH_VERSION}-${TORCH_BACKEND}-cuda-${CUDA_MINOR}-mini-py${py_tag}-${SOURCE_DATE}"
            TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-${TORCH_BACKEND}-cuda-${CUDA_MINOR}-mini-py${py_tag}-${BUILD_DATE}-${ARCH_SUFFIX}"

            echo "=== Extending mini: pytorch ${PYTORCH_VERSION} ${TORCH_BACKEND} cuda-${CUDA_MINOR}-mini py${py_tag} for ${ARCH} ==="
            echo "    Source: ${SOURCE}"
            docker buildx build \
              --progress=plain \
              --platform "${ARCH}" \
              -f Dockerfile.extend \
              --build-arg BASE_IMAGE="${SOURCE}" \
              --tag "${TAG}" \
              --push .

            echo "$TAG" >> built-tags/tags.txt
          done

      - name: Upload mini tags
        uses: actions/upload-artifact@v4
        with:
          name: mini-tags-${{ matrix.torch_version }}-${{ matrix.config_key }}-${{ matrix.arch_suffix }}
          path: built-tags/
          retention-days: 1

  merge-mini-manifests:
    needs: [generate-matrix, extend-mini]
    if: ${{ needs.generate-matrix.outputs.has-mini == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.mini-merge-matrix) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Merge mini manifests
        env:
          NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PYTORCH_VERSION: ${{ matrix.torch_version }}
          TORCH_BACKEND: ${{ matrix.torch_backend }}
          CUDA_MINOR: ${{ matrix.cuda_minor }}
          ARCHES: ${{ matrix.arches }}
          PYTHON_VERSIONS: ${{ matrix.python_versions }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          mkdir -p built-tags

          IFS=',' read -ra ARCH_LIST <<< "$ARCHES"

          for py_tag in ${PYTHON_VERSIONS}; do
            FINAL_TAG="${NAMESPACE}/pytorch:${PYTORCH_VERSION}-${TORCH_BACKEND}-cuda-${CUDA_MINOR}-mini-py${py_tag}-${BUILD_DATE}"
            AMD64_TAG="${FINAL_TAG}-amd64"

            echo "=== Merging mini manifest: ${FINAL_TAG} ==="
            if [[ ${#ARCH_LIST[@]} -gt 1 ]]; then
              ARM64_TAG="${FINAL_TAG}-arm64"
              docker buildx imagetools create \
                -t "${FINAL_TAG}" \
                "${AMD64_TAG}" "${ARM64_TAG}"
            else
              docker buildx imagetools create \
                -t "${FINAL_TAG}" \
                "${AMD64_TAG}"
            fi

            echo "$FINAL_TAG" >> built-tags/tags.txt
          done

      - name: Upload mini manifest tags
        uses: actions/upload-artifact@v4
        with:
          name: mini-manifest-tags-${{ matrix.torch_version }}-${{ matrix.config_key }}
          path: built-tags/
          retention-days: 1

  collect-tags:
    needs: [generate-matrix, extend, merge-manifests, extend-mini, merge-mini-manifests]
    if: always() && !inputs.DRY_RUN
    runs-on: ubuntu-latest
    outputs:
      all-tags: ${{ steps.collect.outputs.tags }}
    steps:
      - name: Download all tag artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{built-tags-*,manifest-tags-*,mini-tags-*,mini-manifest-tags-*}"
          path: all-tags/

      - name: Aggregate tags
        id: collect
        run: |
          if [ -d all-tags ] && [ "$(ls -A all-tags 2>/dev/null)" ]; then
            TAGS=$(find all-tags -name '*.txt' -exec cat {} + | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "Found $(echo "$TAGS" | jq length) unique tags"
          else
            echo "::warning::No tags found - extend may have failed"
            TAGS="[]"
          fi
          {
            echo "tags<<TAGS_EOF"
            echo "$TAGS"
            echo "TAGS_EOF"
          } >> $GITHUB_OUTPUT

  dry-run:
    needs: generate-matrix
    if: ${{ inputs.DRY_RUN }}
    runs-on: ubuntu-latest
    steps:
      - name: Print extend plan
        env:
          BUILD_MATRIX: ${{ needs.generate-matrix.outputs.build-matrix }}
          MERGE_MATRIX: ${{ needs.generate-matrix.outputs.merge-matrix }}
          MINI_BUILD_MATRIX: ${{ needs.generate-matrix.outputs.mini-build-matrix }}
          HAS_MINI: ${{ needs.generate-matrix.outputs.has-mini }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
          SOURCE_DATE: ${{ inputs.SOURCE_DATE }}
          NAMESPACE_STAGING: ${{ secrets.DOCKERHUB_NAMESPACE_STAGING }}
          PROD_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
        run: |
          DEFAULT_PYTHON="312"

          echo "=== DRY RUN - PyTorch Extend Plan ==="
          echo "Source (prod): *-${SOURCE_DATE}"
          echo "Target (staging): *-${BUILD_DATE}"
          echo ""

          echo "=== Extend Jobs ($(echo "$BUILD_MATRIX" | jq '.include | length') total) ==="
          echo "$BUILD_MATRIX" | jq -r '.include[] | "  torch=\(.torch_version) \(.config_key) [\(.arch_suffix)] cuda-\(.cuda_short)"'
          echo ""

          echo "=== Tags that would be created ==="
          CURRENT_VER=""
          MERGE_COUNT=$(echo "$MERGE_MATRIX" | jq '.include | length')
          for ((i=0; i<MERGE_COUNT; i++)); do
            torch_ver=$(echo "$MERGE_MATRIX" | jq -r ".include[$i].torch_version")
            cuda_short=$(echo "$MERGE_MATRIX" | jq -r ".include[$i].cuda_short")
            python_versions=$(echo "$MERGE_MATRIX" | jq -r ".include[$i].python_versions")
            arches=$(echo "$MERGE_MATRIX" | jq -r ".include[$i].arches")

            if [[ "$torch_ver" != "$CURRENT_VER" ]]; then
              echo ""
              echo "--- PyTorch ${torch_ver} ---"
              CURRENT_VER="$torch_ver"
            fi
            echo "  cuda-${cuda_short} (${arches}):"
            for py_tag in ${python_versions}; do
              echo "    ${PROD_NAMESPACE}/pytorch:${torch_ver}-cuda-${cuda_short}-py${py_tag}-24.04-${SOURCE_DATE}"
              echo "      -> ${NAMESPACE_STAGING}/pytorch:${torch_ver}-cuda-${cuda_short}-py${py_tag}-24.04-${BUILD_DATE}"
            done
            echo "    + alias: ${NAMESPACE_STAGING}/pytorch:${torch_ver}-cuda-${cuda_short}-24.04-${BUILD_DATE} (py${DEFAULT_PYTHON})"
          done

          if [[ "$HAS_MINI" == "true" ]]; then
            echo ""
            MINI_COUNT=$(echo "$MINI_BUILD_MATRIX" | jq '.include | length')
            echo "=== Mini Extend Jobs ==="
            CURRENT_VER=""
            for ((i=0; i<MINI_COUNT; i++)); do
              arch_suffix=$(echo "$MINI_BUILD_MATRIX" | jq -r ".include[$i].arch_suffix")
              [[ "$arch_suffix" != "amd64" ]] && continue

              torch_ver=$(echo "$MINI_BUILD_MATRIX" | jq -r ".include[$i].torch_version")
              torch_backend=$(echo "$MINI_BUILD_MATRIX" | jq -r ".include[$i].torch_backend")
              cuda_minor=$(echo "$MINI_BUILD_MATRIX" | jq -r ".include[$i].cuda_minor")
              python_versions=$(echo "$MINI_BUILD_MATRIX" | jq -r ".include[$i].python_versions")

              if [[ "$torch_ver" != "$CURRENT_VER" ]]; then
                echo ""
                echo "--- PyTorch ${torch_ver} (mini) ---"
                CURRENT_VER="$torch_ver"
              fi
              for py_tag in ${python_versions}; do
                echo "  ${PROD_NAMESPACE}/pytorch:${torch_ver}-${torch_backend}-cuda-${cuda_minor}-mini-py${py_tag}-${SOURCE_DATE}"
                echo "    -> ${NAMESPACE_STAGING}/pytorch:${torch_ver}-${torch_backend}-cuda-${cuda_minor}-mini-py${py_tag}-${BUILD_DATE}"
              done
            done
          fi

  notify:
    needs: [generate-matrix, extend, merge-manifests, collect-tags]
    if: always() && !inputs.DRY_RUN
    uses: ./.github/workflows/notify-slack.yml
    with:
      build-result: ${{ needs.extend.result }}
      image-name: "PyTorch (Extended)"
      image-ref: "${{ inputs.SOURCE_DATE }} -> ${{ needs.generate-matrix.outputs.build-date }}"
      image-tags: ${{ needs.collect-tags.outputs.all-tags || '[]' }}
      trigger: ${{ github.event_name }}
      run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
