# .github/actions/merge-arch-manifests/action.yml
name: Merge Arch Manifests
description: >-
  Stitch per-arch tags (pushed earlier by build-arch-image) into a single
  multi-arch manifest at the final tag, using crane. Optionally also creates
  alias tags pointing at the same manifest (for default-python aliases etc.).
  Uses `crane index append` for the merge and `crane copy` for aliases —
  cross-mounts blobs registry-side instead of streaming them through this
  runner (see retag.sh for the same rationale applied to plain retags).

inputs:
  final-tag:
    description: >-
      The multi-arch tag to create (e.g. vastai/comfy:master-cuda-12.9-py312).
      Expects ${final-tag}-amd64 and ${final-tag}-arm64 to already exist on
      the registry.
    required: true
  arches:
    description: "Comma-separated arch suffixes to merge (default: amd64,arm64)"
    required: false
    default: "amd64,arm64"
  extra-tags:
    description: >-
      Optional multiline list of additional tags to point at the same manifest
      (e.g. an alias without -pyXXX). One tag per line. Created via
      `crane copy` so cross-repo aliases stay registry-side too.
    required: false
    default: ""
  dockerhub-username:
    description: "Docker Hub username (pass secrets.DOCKERHUB_USERNAME)"
    required: true
  dockerhub-token:
    description: "Docker Hub token (pass secrets.DOCKERHUB_TOKEN)"
    required: true

outputs:
  manifest-tag:
    description: "The multi-arch manifest tag that was created"
    value: ${{ inputs.final-tag }}

runs:
  using: composite
  steps:
    - name: Set up crane
      uses: imjasonh/setup-crane@v0.4

    - name: Docker Hub login
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}

    - name: Merge arch manifests
      shell: bash
      env:
        FINAL_TAG: ${{ inputs.final-tag }}
        ARCHES: ${{ inputs.arches }}
        EXTRA_TAGS_RAW: ${{ inputs.extra-tags }}
      run: |
        set -euo pipefail

        # Build the list of per-arch source manifests from the comma-separated arches input.
        manifest_flags=()
        IFS=',' read -ra ARCH_LIST <<< "${ARCHES}"
        for arch in "${ARCH_LIST[@]}"; do
          arch="${arch// }"
          [[ -z "$arch" ]] && continue
          manifest_flags+=(--manifest "${FINAL_TAG}-${arch}")
        done

        echo "=== Building index ${FINAL_TAG} from arches: ${ARCHES} ==="
        crane index append \
          --tag "${FINAL_TAG}" \
          "${manifest_flags[@]}"

        # Aliases: crane copy keeps blob mounts registry-side, so even
        # cross-repository aliases don't pull image bytes through the runner.
        while IFS= read -r extra; do
          extra="${extra// }"
          [[ -z "$extra" ]] && continue
          echo "=== Aliasing ${FINAL_TAG} -> ${extra} ==="
          crane copy "${FINAL_TAG}" "${extra}"
        done <<< "${EXTRA_TAGS_RAW}"

        echo "Created manifest: ${FINAL_TAG}"
