version: 1

pip_packages:
  - packages: ["langflow"]

services:
  - name: ollama
    portal_search_term: ollama
    venv: /venv/main
    workdir: /usr/local/bin
    command: ollama serve

  - name: langflow
    portal_search_term: langflow
    workdir: /opt
    command: langflow run ${LANGFLOW_ARGS:-}

post_commands:
  - which ollama > /dev/null 2>&1 || curl -fsSL https://ollama.com/install.sh | sh
  - |
    ollama serve &
    OLLAMA_PID=$!
    for i in $(seq 1 30); do
      curl -s localhost:11434 > /dev/null 2>&1 && break
      [ $i -eq 30 ] && echo "ERROR: ollama failed to start after 60s" && kill $OLLAMA_PID 2>/dev/null && exit 1
      sleep 2
    done
    ollama pull ${OLLAMA_MODEL:-qwen3:8b}
    kill $OLLAMA_PID 2>/dev/null; wait $OLLAMA_PID 2>/dev/null
