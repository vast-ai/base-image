# QA template for Chatterbox — the live-GPU gate boots this with the freshly-built
# STAGING image (CI overrides image/tag) and runs the functional test on it. Keep it
# minimal, private, and faithful to how the image really launches; model the launch spec
# on a sibling templates/<name>-qa (comfyui-qa, vllm-qa).
name: "Chatterbox QA smoke"
image: vastai/chatterbox           # CI overrides image + tag with the freshly-built staging tag
tag: latest
private: true
readme_visible: false
onstart: entrypoint.sh
runtype: jupyter
jup_direct: true
ssh_direct: true
use_ssh: true
use_jupyter_lab: false
ports:
  - "1111:1111"                    # Instance Portal
  - "8080:8080"                    # Jupyter
  - "8004:8004"                    # Chatterbox (loopback :8004, proxied by the portal)
env:
  PORTAL_CONFIG: "localhost:1111:11111:/:Instance Portal|localhost:8004:8004:/:Chatterbox|localhost:8080:18080:/:Jupyter|localhost:8080:8080:/terminals/1:Jupyter Terminal"
  OPEN_BUTTON_PORT: "1111"
  OPEN_BUTTON_TOKEN: "1"
  JUPYTER_DIR: "/"
  DATA_DIRECTORY: "/workspace/"
  # Functional test: the gate boots the image, chatterbox auto-starts and downloads the
  # default Turbo model, then the in-instance harness synthesizes a clip via
  # POST /v1/audio/speech (voice=Emily.wav) and asserts non-trivial RIFF/WAVE bytes.
extra_filters:
  compute_cap:
    gte: 750                       # sm_75 (Turing) — Chatterbox runs on the cu128/torch-2.9 base from Turing up
