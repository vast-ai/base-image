# Default launch template for Chatterbox — the public, user-facing template (the eventual
# recommended/marketplace listing). Launch it as-is to try the image on a real GPU.
name: "Chatterbox"
# Interim test image (the local build pushed for manual testing). At promotion this
# becomes vastai/chatterbox.
image: robatvastai/chatterbox
tag: latest
private: false
readme_visible: true
onstart: entrypoint.sh
runtype: jupyter
jup_direct: true
ssh_direct: true
use_ssh: true
use_jupyter_lab: false
ports:
  - "1111:1111"                    # Instance Portal
  - "8080:8080"                    # Jupyter
  - "8004:8004"                    # Chatterbox (loopback :8004, proxied by the portal)
env:
  PORTAL_CONFIG: "localhost:1111:11111:/:Instance Portal|localhost:8004:8004:/:Chatterbox|localhost:8080:18080:/:Jupyter|localhost:8080:8080:/terminals/1:Jupyter Terminal"
  OPEN_BUTTON_PORT: "1111"
  OPEN_BUTTON_TOKEN: "1"
  JUPYTER_DIR: "/"
  DATA_DIRECTORY: "/workspace/"
  # First boot downloads the default Chatterbox Turbo model (~4 GB VRAM). Set HF_TOKEN for
  # gated model repos. Open the Chatterbox tab in the Instance Portal to synthesize.
extra_filters:
  compute_cap:
    gte: 750                       # sm_75 (Turing) — runs on the cu128/torch-2.9 base from Turing up
