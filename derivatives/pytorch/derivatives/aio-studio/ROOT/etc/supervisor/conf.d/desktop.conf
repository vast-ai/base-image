[program:desktop]
environment=PROC_NAME="%(program_name)s"
command=/opt/supervisor-scripts/desktop.sh
autostart=false
autorestart=true
exitcodes=0
startsecs=60
stopasgroup=true
killasgroup=true
stopsignal=TERM
stopwaitsecs=15
stdout_logfile=/dev/stdout
redirect_stderr=true
stdout_events_enabled=true
stdout_logfile_maxbytes=0
stdout_logfile_backups=0
